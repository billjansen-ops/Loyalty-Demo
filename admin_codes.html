<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Codes - Client Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <!--
    Codes admin (Session 124) — mint / list / revoke general-purpose codes
    (the `code` table). A code is a QR/referral/access token any function can
    use: a validity window + usage cap + JSONB context. The public link form is
    <origin>/p/<token>. Platform-general page (root), tenant-scoped via session.
  -->
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: calc(100vh - 48px) !important; min-height: auto !important; display: block; }
    .main-content { display: flex; flex-direction: column; height: 100%; min-height: 0; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 12px 20px; }
    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }
    .tenant-indicator { padding: 6px 10px; border-radius: 4px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .tenant-indicator.info { background: var(--primary-light, #dbeafe); color: var(--primary-dark, #1e40af); border: 1px solid var(--primary, #3b82f6); }
    .tenant-indicator.warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .table-container { background: white; border: 1px solid #e5e7eb; border-radius: 4px; overflow: hidden; }
    .table-header { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    .table-header h2 { margin: 0; font-size: 15px; font-weight: 600; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #f9fafb; padding: 6px 10px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
    .data-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; font-size: 13px; vertical-align: top; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover { background: #fafafa; }
    .badge { display: inline-block; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-active { background: #dcfce7; color: #065f46; }
    .badge-revoked { background: #fee2e2; color: #991b1b; }
    .badge-type { background: #ede9fe; color: #5b21b6; font-family: 'Monaco','Courier New',monospace; }
    .code-cell { font-family: 'Monaco','Courier New',monospace; font-weight: 600; font-size: 12px; word-break: break-all; }
    .ctx { font-size: 11px; color: #6b7280; max-width: 220px; }
    .ctx span { display: inline-block; background: #f1f5f9; border-radius: 4px; padding: 1px 6px; margin: 1px 2px 1px 0; }
    .empty-state { text-align: center; padding: 24px 12px; color: #6b7280; }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    /* Mint panel */
    .mint { background: white; border: 1px solid #e5e7eb; border-radius: 4px; margin-bottom: 14px; }
    .mint-head { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; font-weight: 600; font-size: 14px; }
    .mint-body { padding: 12px; display: none; }
    .mint-body.open { display: block; }
    .fgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 10px; }
    .fld label { display: block; font-size: 11px; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
    .fld input, .fld select { width: 100%; padding: 6px 8px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 4px; font-family: inherit; }
    .kv-row { display: flex; gap: 6px; margin-top: 6px; }
    .kv-row input { flex: 1; padding: 6px 8px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 4px; }
    .mint-actions { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
    /* QR modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; z-index: 50; }
    .overlay.open { display: flex; }
    .qr-card { background: white; border-radius: 12px; padding: 20px; text-align: center; max-width: 320px; }
    .qr-card h3 { margin: 0 0 4px; font-size: 15px; }
    .qr-card .url { font-family: 'Monaco','Courier New',monospace; font-size: 11px; color: #475569; word-break: break-all; margin: 8px 0; }
    #qrBox { display: flex; justify-content: center; margin: 10px 0; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <h1 class="page-title">🎟️ Codes</h1>
            <p class="page-subtitle">QR / referral / access codes — a validity window, a usage cap, and carried context. Public link: <code>/p/&lt;code&gt;</code></p>
          </div>
          <div id="tenantIndicator"></div>
        </div>
      </div>

      <div class="page-content">
        <!-- Mint panel -->
        <div class="mint">
          <div class="mint-head" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleMint()">
            <span>+ Mint a code</span><span id="mintCaret">▸</span>
          </div>
          <div class="mint-body" id="mintBody">
            <div class="fgrid">
              <div class="fld"><label>Code type</label><input id="f_type" placeholder="PP_REFERRAL" list="typeList">
                <datalist id="typeList"><option value="PP_REFERRAL"><option value="OER_OBSERVER"></datalist></div>
              <div class="fld"><label>Start date (optional)</label><input id="f_start" type="date"></div>
              <div class="fld"><label>End date (optional)</label><input id="f_end" type="date"></div>
              <div class="fld"><label>Max uses (blank = unlimited)</label><input id="f_max" type="number" min="1" placeholder="∞"></div>
            </div>
            <div style="margin-top:12px">
              <label style="font-size:11px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.4px">Context (named value pairs)</label>
              <div id="kvList"></div>
              <button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="addKv()">+ Add variable</button>
            </div>
            <div class="mint-actions">
              <button class="btn btn-primary" onclick="mint()">Mint code</button>
              <span id="mintMsg" style="font-size:12px;color:#6b7280"></span>
            </div>
          </div>
        </div>

        <div class="table-container">
          <div class="table-header"><h2>Codes</h2><button class="btn btn-secondary btn-sm" onclick="loadData()">↻ Refresh</button></div>
          <table class="data-table">
            <thead>
              <tr>
                <th>Code</th><th>Type</th><th>Status</th><th>Uses</th><th>Valid dates</th><th>Context</th><th style="width:200px">Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody"><tr><td colspan="7" class="empty-state">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- QR modal -->
  <div class="overlay" id="qrOverlay" onclick="if(event.target===this)closeQr()">
    <div class="qr-card">
      <h3 id="qrType"></h3>
      <div id="qrBox"></div>
      <div class="url" id="qrUrl"></div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button class="btn btn-secondary btn-sm" onclick="copyUrl(window._qrUrl)">Copy link</button>
        <button class="btn btn-secondary btn-sm" onclick="closeQr()">Close</button>
      </div>
    </div>
  </div>

  <script src="/qrcode.min.js"></script>
  <script>
    const API_BASE = window.LP_STATE?.apiBase || window.location.origin;
    const tid = () => sessionStorage.getItem('tenant_id');

    function showTenantIndicator() {
      const id = tid(), name = sessionStorage.getItem('tenant_name');
      const el = document.getElementById('tenantIndicator');
      el.innerHTML = id
        ? `<span class="tenant-indicator info">${name || 'Tenant ' + id}</span>`
        : `<span class="tenant-indicator warning">⚠️ <a href="menu.html">Select tenant</a></span>`;
    }

    function toggleMint() {
      const b = document.getElementById('mintBody');
      b.classList.toggle('open');
      document.getElementById('mintCaret').textContent = b.classList.contains('open') ? '▾' : '▸';
      if (b.classList.contains('open') && !document.querySelector('.kv-row')) addKv();
    }
    function addKv(k, v) {
      const row = document.createElement('div');
      row.className = 'kv-row';
      row.innerHTML = `<input placeholder="name (e.g. track)" value="${k||''}"><input placeholder="value (e.g. stability)" value="${v||''}">`
        + `<button class="btn btn-secondary btn-sm" onclick="this.parentNode.remove()">✕</button>`;
      document.getElementById('kvList').appendChild(row);
    }

    async function mint() {
      const msg = document.getElementById('mintMsg');
      const type = document.getElementById('f_type').value.trim();
      if (!type) { msg.textContent = 'Code type is required.'; return; }
      const context = {};
      document.querySelectorAll('.kv-row').forEach(r => {
        const [k, v] = r.querySelectorAll('input');
        if (k.value.trim()) context[k.value.trim()] = v.value.trim();
      });
      const body = {
        code_type: type,
        start_date: document.getElementById('f_start').value || undefined,
        end_date: document.getElementById('f_end').value || undefined,
        max_uses: document.getElementById('f_max').value ? Number(document.getElementById('f_max').value) : undefined,
        context
      };
      msg.textContent = 'Minting…';
      try {
        const resp = await fetch(`${API_BASE}/v1/codes?tenant_id=${tid()}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        if (!resp.ok) throw new Error((await resp.json()).error || 'Failed');
        const row = await resp.json();
        msg.textContent = `✓ Minted ${row.code}`;
        document.querySelectorAll('.kv-row').forEach(r => r.remove());
        document.getElementById('f_type').value = ''; document.getElementById('f_start').value = '';
        document.getElementById('f_end').value = ''; document.getElementById('f_max').value = '';
        loadData();
      } catch (e) { msg.textContent = 'Error: ' + e.message; }
    }

    function ctxHtml(ctx) {
      const keys = Object.keys(ctx || {});
      if (!keys.length) return '<span style="opacity:.5">—</span>';
      return keys.map(k => `<span>${k}: ${String(ctx[k])}</span>`).join('');
    }

    async function loadData() {
      showTenantIndicator();
      if (!tid()) { document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="empty-state">Please select a tenant.</td></tr>'; return; }
      try {
        const resp = await fetch(`${API_BASE}/v1/codes?tenant_id=${tid()}`);
        if (!resp.ok) throw new Error('Failed to load');
        const items = await resp.json();
        const tbody = document.getElementById('tableBody');
        if (!items.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No codes yet. Mint one above.</td></tr>'; return; }
        tbody.innerHTML = items.map(c => {
          const window_ = (c.start_date_str || '…') + ' → ' + (c.end_date_str || '∞');
          const uses = (c.used_count ?? 0) + (c.max_uses != null ? ' / ' + c.max_uses : ' / ∞');
          const active = c.status === 'A';
          return `<tr>
            <td class="code-cell">${c.code}</td>
            <td><span class="badge badge-type">${c.code_type}</span></td>
            <td>${active ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-revoked">Revoked</span>'}</td>
            <td>${uses}</td>
            <td style="font-size:12px;color:#6b7280;white-space:nowrap">${window_}</td>
            <td class="ctx">${ctxHtml(c.context)}</td>
            <td><div class="row-actions">
              <button class="btn btn-secondary btn-sm" onclick="copyUrl('${API_BASE}/p/${c.code}')">Copy link</button>
              <button class="btn btn-secondary btn-sm" onclick="showQr('${c.code}','${c.code_type}')">QR</button>
              ${active ? `<button class="btn btn-secondary btn-sm" onclick="revoke(${c.link})">Revoke</button>` : ''}
            </div></td>
          </tr>`;
        }).join('');
      } catch (e) {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="empty-state" style="color:#dc2626">Error: ${e.message}</td></tr>`;
      }
    }

    async function revoke(link) {
      if (!confirm('Revoke this code? The link will stop working immediately.')) return;
      try {
        const resp = await fetch(`${API_BASE}/v1/codes/${link}?tenant_id=${tid()}`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'R' })
        });
        if (!resp.ok) throw new Error((await resp.json()).error || 'Failed');
        loadData();
      } catch (e) { alert('Error: ' + e.message); }
    }

    function copyUrl(url) {
      navigator.clipboard.writeText(url).then(() => {}, () => window.prompt('Copy this link:', url));
    }
    function showQr(code, type) {
      const url = `${API_BASE}/p/${code}`;
      window._qrUrl = url;
      document.getElementById('qrType').textContent = type;
      document.getElementById('qrUrl').textContent = url;
      const box = document.getElementById('qrBox'); box.innerHTML = '';
      const qr = qrcode(0, 'M');   // Arase qrcode-generator: 0 = auto-size, 'M' = error correction
      qr.addData(url);
      qr.make();
      box.innerHTML = qr.createSvgTag({ cellSize: 5, margin: 2, scalable: true });
      document.getElementById('qrOverlay').classList.add('open');
    }
    function closeQr() { document.getElementById('qrOverlay').classList.remove('open'); }

    loadData();
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
