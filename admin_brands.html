<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Brand Management - Client Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: 100vh !important; min-height: auto !important; display: block; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 12px 20px; }

    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }

    .tenant-indicator { padding: 6px 10px; border-radius: 4px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .tenant-indicator.info { background: var(--primary-light, #dbeafe); color: var(--primary-dark, #1e40af); border: 1px solid var(--primary, #3b82f6); }

    .table-container { background: white; border: 1px solid #e5e7eb; border-radius: 4px; overflow: hidden; }
    .table-header { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    .table-header h2 { margin: 0; font-size: 15px; font-weight: 600; }

    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #f9fafb; padding: 6px 10px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
    .data-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover { background: #f9fafb; }

    .badge { display: inline-block; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-active { background: #dcfce7; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .badge-earn { background: #dbeafe; color: #1e40af; }

    .code-cell { font-family: 'Monaco', 'Courier New', monospace; font-weight: 600; font-size: 12px; }
    .empty-state { text-align: center; padding: 24px 12px; color: #6b7280; }
    .row-actions { display: flex; gap: 6px; }

    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 8px; padding: 20px; width: 400px; max-width: 90%; }
    .modal-header { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title">🏨 Brand Management</h1>
            <p class="page-subtitle">Manage hotel brands and their earning rates</p>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <div id="tenantIndicator"></div>
            <a href="admin_reference_marriott.html" class="btn btn-secondary">← Back to Reference</a>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="table-container">
          <div class="table-header">
            <h2>Hotel Brands</h2>
            <button class="btn btn-primary" onclick="openModal()">+ Add Brand</button>
          </div>
          
          <table class="data-table">
            <thead>
              <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Earn Rate</th>
                <th>Status</th>
                <th style="width: 140px;">Actions</th>
              </tr>
            </thead>
            <tbody id="brandsBody">
              <tr><td colspan="5" class="empty-state">Loading brands...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div id="brandModal" class="modal">
    <div class="modal-content">
      <div class="modal-header" id="modalTitle">Add Brand</div>
      <form id="brandForm">
        <input type="hidden" id="brandId">
        <div class="form-group">
          <label>Code *</label>
          <input type="text" id="brandCode" required maxlength="10" placeholder="e.g., MAR">
        </div>
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="brandName" required placeholder="e.g., Marriott Hotels">
        </div>
        <div class="form-group">
          <label>Base Earn Rate (points per $1) *</label>
          <input type="number" id="earnRate" required step="0.5" min="0" max="20" value="10.00">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="isActive">
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = window.LP_STATE?.apiBase || 'http://127.0.0.1:4001';
    
    function showTenantIndicator() {
      const tenantName = sessionStorage.getItem('tenant_name') || 'Marriott Hotels';
      document.getElementById('tenantIndicator').innerHTML = 
        `<span class="tenant-indicator info">${tenantName}</span>`;
    }
    
    async function loadBrands() {
      try {
        const response = await fetch(`${API_BASE}/v1/brands`);
        const brands = await response.json();
        
        const tbody = document.getElementById('brandsBody');
        
        if (brands.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No brands found</td></tr>';
          return;
        }
        
        tbody.innerHTML = brands.map(b => `
          <tr>
            <td class="code-cell">${b.code}</td>
            <td>${b.name}</td>
            <td><span class="badge badge-earn">${parseFloat(b.base_earn_rate).toFixed(1)}x</span></td>
            <td><span class="badge ${b.is_active ? 'badge-active' : 'badge-inactive'}">${b.is_active ? 'Active' : 'Inactive'}</span></td>
            <td>
              <div class="row-actions">
                <button class="btn btn-sm btn-secondary" onclick="editBrand(${b.brand_id})">Edit</button>
              </div>
            </td>
          </tr>
        `).join('');
        
      } catch (e) {
        console.error('Error loading brands:', e);
        document.getElementById('brandsBody').innerHTML = 
          '<tr><td colspan="5" class="empty-state">Error loading brands</td></tr>';
      }
    }
    
    function openModal(brand = null) {
      document.getElementById('modalTitle').textContent = brand ? 'Edit Brand' : 'Add Brand';
      document.getElementById('brandId').value = brand?.brand_id || '';
      document.getElementById('brandCode').value = brand?.code || '';
      document.getElementById('brandName').value = brand?.name || '';
      document.getElementById('earnRate').value = brand?.base_earn_rate || '10.00';
      document.getElementById('isActive').value = brand?.is_active !== false ? 'true' : 'false';
      document.getElementById('brandCode').disabled = !!brand;
      document.getElementById('brandModal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('brandModal').classList.remove('active');
      document.getElementById('brandForm').reset();
    }
    
    async function editBrand(brandId) {
      try {
        const response = await fetch(`${API_BASE}/v1/brands/${brandId}`);
        const brand = await response.json();
        openModal(brand);
      } catch (e) {
        alert('Error loading brand');
      }
    }
    
    document.getElementById('brandForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const brandId = document.getElementById('brandId').value;
      const data = {
        code: document.getElementById('brandCode').value.toUpperCase(),
        name: document.getElementById('brandName').value,
        base_earn_rate: parseFloat(document.getElementById('earnRate').value),
        is_active: document.getElementById('isActive').value === 'true'
      };
      
      try {
        const url = brandId ? `${API_BASE}/v1/brands/${brandId}` : `${API_BASE}/v1/brands`;
        const method = brandId ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Save failed');
        }
        
        closeModal();
        loadBrands();
      } catch (e) {
        alert('Error saving brand: ' + e.message);
      }
    });
    
    // Init
    showTenantIndicator();
    loadBrands();
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
