<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Edit Badge - Client Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    /* LONGORIA: Compact scroll layout */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: 100vh !important; min-height: auto !important; display: block; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 12px 20px; }

    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }

    .tenant-indicator { padding: 6px 10px; border-radius: 4px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .tenant-indicator.info { background: var(--primary-light, #dbeafe); color: var(--primary-dark, #1e40af); border: 1px solid var(--primary, #3b82f6); }
    .tenant-indicator.warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }

    .form-container { max-width: 500px; }
    .form-section { background: white; border: 1px solid #e5e7eb; border-radius: 4px; padding: 12px; }

    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-weight: 600; margin-bottom: 3px; font-size: 12px; color: #374151; }
    .form-input { width: 100%; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; font-family: inherit; box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1); }
    .form-input[readonly] { background: #f9fafb; color: #6b7280; }
    .form-input.short { width: 150px; }
    .form-input.icon-input { width: 80px; font-size: 18px; text-align: center; }
    .form-hint { font-size: 11px; color: #6b7280; margin-top: 2px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .form-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e7eb; }

    .error-message { padding: 8px; background: #fee2e2; border: 1px solid #fecaca; border-radius: 4px; color: #991b1b; margin-bottom: 12px; display: none; font-size: 13px; }

    .icon-preview { font-size: 32px; margin-left: 12px; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title" id="pageTitle">🏅 Create Badge</h1>
            <p class="page-subtitle" id="pageSubtitle">Add a new badge to your program</p>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <div id="tenantIndicator"></div>
            <a href="admin_badges.html" class="btn btn-secondary">← Back to Badges</a>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="form-container">
          <div id="errorMessage" class="error-message"></div>

          <div class="form-section">
            <form id="badgeForm">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="badgeCode">Badge Code</label>
                  <input type="text" id="badgeCode" class="form-input short" placeholder="e.g., MILLION_MILER" maxlength="50" required style="text-transform: uppercase" oninput="this.value = this.value.toUpperCase()">
                  <div class="form-hint">Unique identifier for this badge</div>
                </div>

                <div class="form-group">
                  <label class="form-label" for="badgeIcon">Icon</label>
                  <div style="display: flex; align-items: center;">
                    <input type="text" id="badgeIcon" class="form-input icon-input" placeholder="🏅" maxlength="10" oninput="updateIconPreview()">
                    <span id="iconPreview" class="icon-preview">🏅</span>
                  </div>
                  <div class="form-hint">Emoji or short text</div>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="badgeName">Badge Name</label>
                <input type="text" id="badgeName" class="form-input" placeholder="e.g., Million Miler" maxlength="100" required>
                <div class="form-hint">Display name for the badge</div>
              </div>

              <div class="form-group">
                <label class="form-label" for="badgeStatus">Status</label>
                <select id="badgeStatus" class="form-input short">
                  <option value="A">Active</option>
                  <option value="I">Inactive</option>
                </select>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Save Badge</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='admin_badges.html'">Cancel</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.LP_STATE?.apiBase || window.location.origin;
    
    function showTenantIndicator() {
      const tenantId = sessionStorage.getItem('tenant_id');
      const tenantName = sessionStorage.getItem('tenant_name');
      const indicator = document.getElementById('tenantIndicator');
      
      if (!tenantId) {
        indicator.innerHTML = `<span class="tenant-indicator warning">⚠️ <a href="menu.html">Select tenant</a></span>`;
        document.getElementById('badgeForm').style.opacity = '0.5';
        document.getElementById('badgeForm').style.pointerEvents = 'none';
      } else {
        indicator.innerHTML = `<span class="tenant-indicator info">${tenantName || 'Tenant ' + tenantId}</span>`;
      }
    }
    
    showTenantIndicator();
    
    function updateIconPreview() {
      const icon = document.getElementById('badgeIcon').value || '🏅';
      document.getElementById('iconPreview').textContent = icon;
    }
    
    const urlParams = new URLSearchParams(window.location.search);
    const badgeLinkParam = urlParams.get('link');
    const isEdit = !!badgeLinkParam;
    
    if (isEdit) {
      document.getElementById('pageTitle').textContent = '🏅 Edit Badge';
      document.getElementById('pageSubtitle').textContent = 'Update badge information';
      loadBadgeData();
    }
    
    async function loadBadgeData() {
      const tenantId = sessionStorage.getItem('tenant_id');
      if (!tenantId) return;
      
      try {
        const response = await fetch(`${API_BASE}/v1/badges/${badgeLinkParam}?tenant_id=${tenantId}`);
        if (!response.ok) throw new Error('Failed to load badge');
        
        const badge = await response.json();
        
        if (badge) {
          document.getElementById('badgeCode').value = badge.badge_code || '';
          document.getElementById('badgeCode').readOnly = true;
          document.getElementById('badgeName').value = badge.badge_name || '';
          document.getElementById('badgeIcon').value = badge.icon || '';
          document.getElementById('badgeStatus').value = badge.status || 'A';
          updateIconPreview();
        }
      } catch (e) {
        showError('Failed to load badge data: ' + e.message);
      }
    }
    
    document.getElementById('badgeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const tenantId = sessionStorage.getItem('tenant_id');
      if (!tenantId) {
        showError('Please select a tenant first');
        return;
      }
      
      const badgeCode = document.getElementById('badgeCode').value.trim().toUpperCase();
      const badgeName = document.getElementById('badgeName').value.trim();
      const icon = document.getElementById('badgeIcon').value.trim();
      const status = document.getElementById('badgeStatus').value;
      
      if (!badgeCode || !badgeName) {
        showError('Please fill in all required fields (Code, Name)');
        return;
      }
      
      try {
        const payload = {
          badge_code: badgeCode,
          badge_name: badgeName,
          icon: icon || null,
          status: status,
          tenant_id: parseInt(tenantId)
        };
        
        let url = `${API_BASE}/v1/badges`;
        let method = 'POST';
        
        if (isEdit) {
          url = `${API_BASE}/v1/badges/${badgeLinkParam}`;
          method = 'PUT';
        }
        
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to save badge');
        }
        
        window.location.href = 'admin_badges.html';
        
      } catch (e) {
        showError('Failed to save badge: ' + e.message);
      }
    });
    
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      errorDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
