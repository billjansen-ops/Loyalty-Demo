<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>External Actions - Client Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: 100vh !important; min-height: auto !important; display: block; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 12px 20px; }
    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }
    .tenant-indicator { padding: 6px 10px; border-radius: 4px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .tenant-indicator.info { background: var(--primary-light, #dbeafe); color: var(--primary-dark, #1e40af); border: 1px solid var(--primary, #3b82f6); }
    .tenant-indicator.warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .table-container { background: white; border: 1px solid #e5e7eb; border-radius: 4px; overflow: hidden; }
    .table-header { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    .table-header h2 { margin: 0; font-size: 15px; font-weight: 600; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #f9fafb; padding: 6px 10px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
    .data-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover { background: #f9fafb; }
    .badge { display: inline-block; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-active { background: #dcfce7; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .code-cell { font-family: 'Monaco', 'Courier New', monospace; font-weight: 600; font-size: 12px; }
    .func-cell { font-family: 'Monaco', 'Courier New', monospace; font-size: 12px; color: #7c3aed; }
    .empty-state { text-align: center; padding: 24px 12px; color: #6b7280; }
    .row-actions { display: flex; gap: 6px; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title">⚡ External Actions</h1>
            <p class="page-subtitle">Map external promotion result codes to server-side functions</p>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <div id="tenantIndicator"></div>
            <a href="admin_rules.html" class="btn btn-secondary">← Back to Rules</a>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="table-container">
          <div class="table-header">
            <h2>External Actions</h2>
            <button class="btn btn-primary" onclick="addNew()">+ Add Action</button>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Function</th>
                <th>Description</th>
                <th>Status</th>
                <th style="width: 140px;">Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="6" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.LP_STATE?.apiBase || window.location.origin;

    function showTenantIndicator() {
      const tenantId = sessionStorage.getItem('tenant_id');
      const tenantName = sessionStorage.getItem('tenant_name');
      const indicator = document.getElementById('tenantIndicator');
      if (!tenantId) {
        indicator.innerHTML = `<span class="tenant-indicator warning">⚠️ <a href="menu.html">Select tenant</a></span>`;
      } else {
        indicator.innerHTML = `<span class="tenant-indicator info">${tenantName || 'Tenant ' + tenantId}</span>`;
      }
    }

    async function loadData() {
      const tenantId = sessionStorage.getItem('tenant_id');
      showTenantIndicator();
      if (!tenantId) {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="empty-state">Please select a tenant.</td></tr>';
        return;
      }
      try {
        const resp = await fetch(`${API_BASE}/v1/external-actions?tenant_id=${tenantId}`);
        if (!resp.ok) throw new Error('Failed to load');
        const items = await resp.json();
        const tbody = document.getElementById('tableBody');
        if (!items.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No external actions defined. Click "+ Add Action" to create one.</td></tr>';
          return;
        }
        tbody.innerHTML = items.map(a => `
          <tr>
            <td class="code-cell">${a.action_code}</td>
            <td>${a.action_name}</td>
            <td class="func-cell">${a.function_name}</td>
            <td style="font-size:12px;color:#6b7280;max-width:300px">${a.description || '—'}</td>
            <td>${a.is_active ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>'}</td>
            <td>
              <div class="row-actions">
                <button class="btn btn-secondary btn-sm" onclick="editItem(${a.action_id})">✏️ Edit</button>
                <button class="btn btn-secondary btn-sm" onclick="deleteItem(${a.action_id}, '${a.action_name.replace(/'/g,"\\'")}')">🗑️</button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch(e) {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="6" class="empty-state" style="color:#dc2626">Error: ${e.message}</td></tr>`;
      }
    }

    function addNew() { window.location.href = 'admin_external_action_edit.html'; }
    function editItem(id) { window.location.href = `admin_external_action_edit.html?action_id=${id}`; }

    async function deleteItem(id, name) {
      if (!confirm(`Delete external action "${name}"?`)) return;
      const tenantId = sessionStorage.getItem('tenant_id');
      try {
        const resp = await fetch(`${API_BASE}/v1/external-actions/${id}?tenant_id=${tenantId}`, { method: 'DELETE' });
        if (!resp.ok) throw new Error((await resp.json()).error || 'Failed');
        loadData();
      } catch(e) { alert('Error: ' + e.message); }
    }

    loadData();
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
