<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Edit User - System Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    /* Normal document flow — the page scrolls like a page (no viewport lock,
       no hidden inner scroll region), and the two-column layout keeps
       everything above the fold on a normal screen anyway. */
    html, body { margin: 0; }
    .app-layout { min-height: auto !important; display: block; margin-top: 48px; }
    .main-content { display: block; }
    .page-header { padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { padding: 12px 20px; }

    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }

    .form-container { max-width: 1100px; }
    /* Two columns on a normal screen — account details left, assignments right —
       so the whole page is visible without scrolling. Stacks on narrow windows. */
    .form-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
    @media (max-width: 900px) { .form-columns { grid-template-columns: 1fr; } }
    .form-section { background: white; border: 1px solid #e5e7eb; border-radius: 4px; padding: 12px; margin-bottom: 12px; }
    .form-section-title { font-weight: 600; font-size: 14px; margin: 0 0 12px 0; padding-bottom: 8px; border-bottom: 1px solid #e5e7eb; }

    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-weight: 600; margin-bottom: 3px; font-size: 12px; color: #374151; }
    .form-input { width: 100%; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; font-family: inherit; box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1); }
    .form-input[readonly] { background: #f9fafb; color: #6b7280; }
    .form-hint { font-size: 11px; color: #6b7280; margin-top: 2px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e7eb; }

    .error-message { padding: 8px; background: #fee2e2; border: 1px solid #fecaca; border-radius: 4px; color: #991b1b; margin-bottom: 12px; display: none; font-size: 13px; }
    .success-message { padding: 8px; background: #dcfce7; border: 1px solid #bbf7d0; border-radius: 4px; color: #065f46; margin-bottom: 12px; display: none; font-size: 13px; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'admin' });</script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title" id="pageTitle">👤 Create User</h1>
            <p class="page-subtitle" id="pageSubtitle">Add a new platform user</p>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <a href="admin_users.html" class="btn btn-secondary">← Back</a>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="form-container">
          <div id="errorMessage" class="error-message"></div>
          <div id="successMessage" class="success-message"></div>

          <div class="form-columns">
          <div>
          <div class="form-section">
            <h3 class="form-section-title">User Information</h3>
            <form id="userForm">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="username">Username</label>
                  <input type="text" id="username" class="form-input" placeholder="e.g., jsmith" required>
                  <div class="form-hint">Used for login</div>
                </div>

                <div class="form-group">
                  <label class="form-label" for="displayName">Display Name</label>
                  <input type="text" id="displayName" class="form-input" placeholder="e.g., John Smith" required>
                  <div class="form-hint">Shown in UI</div>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="role">Role</label>
                  <select id="role" class="form-input" required>
                    <option value="csr">CSR</option>
                    <option value="admin">Admin</option>
                    <option value="superuser">Superuser</option>
                  </select>
                  <div class="form-hint">Access level</div>
                </div>

                <div class="form-group">
                  <label class="form-label" for="tenantId">Tenant</label>
                  <select id="tenantId" class="form-input">
                    <option value="">All Tenants (Superuser)</option>
                  </select>
                  <div class="form-hint">Leave blank for superuser access</div>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="status">Status</label>
                <select id="status" class="form-input" style="width: 150px;">
                  <option value="true">Active</option>
                  <option value="false">Inactive</option>
                </select>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Save User</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='admin_users.html'">Cancel</button>
              </div>
            </form>
          </div>

          <!-- Password section - different for create vs edit -->
          <div class="form-section" id="passwordSection">
            <h3 class="form-section-title" id="passwordTitle">Set Password</h3>
            <form id="passwordForm">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="password">Password</label>
                  <input type="password" id="password" class="form-input" placeholder="Enter password" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="passwordConfirm">Confirm Password</label>
                  <input type="password" id="passwordConfirm" class="form-input" placeholder="Confirm password" required>
                </div>
              </div>
              <div class="form-hint" style="margin-bottom: 12px;">Minimum 4 characters</div>
              <button type="submit" class="btn btn-secondary" id="passwordBtn">Set Password</button>
            </form>
          </div>
          </div><!-- /left column -->

          <!-- Right column: user assignments — driven entirely by the tenant's
               user-level molecules (parent_bytes = 4). Hidden unless the user's
               tenant has any. Nothing tenant-specific is hardcoded here: section
               titles, list values, and reference lookups all come from molecule
               configuration. -->
          <div id="assignmentsContainer"></div>
          </div><!-- /form-columns -->
        </div>
      </div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="page-context.js"></script>
  <script>
    const API_BASE = window.LP_STATE?.apiBase || window.location.origin;
    
    // Admins and superusers. A tenant admin manages only their own tenant's
    // people — the server enforces that (S121); this page also trims the
    // superuser-only controls below.
    if (!Auth.requireAdmin()) {
      // Redirect handled by requireAdmin
    }
    const IS_SUPERUSER = Auth.isSuperuser();
    
    // Platform rule: no ids in URLs. The user list hands the selected person
    // over via PageContext (sessionStorage); no context = create mode.
    const userId = PageContext.get().userId || null;
    const isEdit = !!userId;
    
    // Load tenants for dropdown
    async function loadTenants() {
      try {
        const response = await fetch(`${API_BASE}/v1/tenants`);
        if (!response.ok) throw new Error('Failed to load tenants');
        
        const tenants = await response.json();
        const select = document.getElementById('tenantId');
        
        tenants.forEach(tenant => {
          const option = document.createElement('option');
          option.value = tenant.tenant_id;
          option.textContent = tenant.name;
          select.appendChild(option);
        });
      } catch (e) {
        console.error('Error loading tenants:', e);
      }
    }
    
    // Setup page for create vs edit
    async function setupPage() {
      await loadTenants();

      // A tenant admin works inside their own tenant only: no superuser role
      // option, tenant fixed to their own. The server refuses both anyway (S121)
      // — this just stops the page offering controls that can only fail.
      if (!IS_SUPERUSER) {
        const roleSel = document.getElementById('role');
        const superOpt = Array.from(roleSel.options).find(o => o.value === 'superuser');
        if (superOpt) superOpt.remove();
        const tenantSel = document.getElementById('tenantId');
        tenantSel.value = String(Auth.getTenantId() || '');
        tenantSel.disabled = true;
        const blankOpt = Array.from(tenantSel.options).find(o => o.value === '');
        if (blankOpt) blankOpt.remove();
      }

      if (isEdit) {
        document.getElementById('pageTitle').textContent = '👤 Edit User';
        document.getElementById('pageSubtitle').textContent = 'Update user information';
        document.getElementById('passwordTitle').textContent = 'Reset Password';
        document.getElementById('passwordBtn').textContent = 'Reset Password';
        document.getElementById('password').required = false;
        document.getElementById('passwordConfirm').required = false;
        
        // Load user data
        await loadUserData();
      }
    }
    
    async function loadUserData() {
      try {
        const response = await fetch(`${API_BASE}/v1/users/${userId}`);
        if (!response.ok) throw new Error('Failed to load user');

        const user = await response.json();

        document.getElementById('username').value = user.username;
        document.getElementById('username').readOnly = true;  // Can't change username
        document.getElementById('displayName').value = user.display_name;
        document.getElementById('role').value = user.role;
        document.getElementById('tenantId').value = user.tenant_id || '';
        document.getElementById('status').value = user.is_active ? 'true' : 'false';

        await loadAssignments(user);

      } catch (e) {
        showError('Failed to load user: ' + e.message);
      }
    }

    // ============================================
    // USER ASSIGNMENTS — one editor per user-level molecule of the user's tenant.
    // Everything is data-driven: which sections appear, their titles, the dropdown
    // values, and the reference lookups all come from molecule configuration.
    // ============================================

    let assignmentMolecules = [];

    async function loadAssignments(user) {
      const container = document.getElementById('assignmentsContainer');
      container.innerHTML = '';
      if (!user.tenant_id) return; // tenant-less superuser logins carry no assignments

      const molResp = await fetch(`${API_BASE}/v1/molecules?tenant_id=${user.tenant_id}`);
      if (!molResp.ok) return; // no access to that tenant's config — leave section absent
      const molecules = await molResp.json();
      const candidates = molecules.filter(m => m.parent_bytes === 4 && m.is_active && m.molecule_type === 'D');
      if (candidates.length === 0) return;

      // Full definitions (column metadata rides on the detail endpoint)
      const defs = [];
      for (const mol of candidates) {
        const defResp = await fetch(`${API_BASE}/v1/molecules/${mol.molecule_id}?tenant_id=${user.tenant_id}`);
        if (defResp.ok) defs.push(await defResp.json());
      }

      // A molecule that OWNS a value list borrowed by another molecule is the list's
      // home, not an assignment surface — assigning its bare value to a user stores a
      // meaningless row. Data-driven exclusion: hide any molecule another one borrows from.
      const listSources = new Set();
      defs.forEach(d => (d.column_definitions || []).forEach(c => {
        if (c.list_source_molecule_id) listSources.add(c.list_source_molecule_id);
      }));
      assignmentMolecules = defs.filter(d => !listSources.has(d.molecule_id));

      for (const def of assignmentMolecules) {
        container.appendChild(await buildAssignmentSection(user, def));
      }
    }

    async function buildAssignmentSection(user, def) {
      const section = document.createElement('div');
      section.className = 'form-section';
      section.id = `assign_${def.molecule_id}`;

      const title = document.createElement('h3');
      title.className = 'form-section-title';
      title.textContent = def.label || def.molecule_key;
      section.appendChild(title);

      const list = document.createElement('div');
      list.id = `assignList_${def.molecule_id}`;
      section.appendChild(list);

      // Add-row controls, one per column
      const controls = document.createElement('div');
      controls.style.cssText = 'display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; margin-top:10px; padding-top:10px; border-top:1px solid #e5e7eb;';
      const inputs = [];

      for (const col of (def.column_definitions || [])) {
        if (col.value_kind === 'internal_list' || col.value_kind === 'list') {
          const wrap = fieldWrap(col.description || 'Value');
          const sel = document.createElement('select');
          sel.className = 'form-input';
          const vResp = await fetch(`${API_BASE}/v1/molecules/${def.molecule_id}/values?tenant_id=${user.tenant_id}`);
          if (!vResp.ok) throw new Error('Could not load list values');
          const values = await vResp.json();
          sel.appendChild(new Option('— Select —', ''));
          values.forEach(v => sel.appendChild(new Option(v.label, v.value)));
          wrap.appendChild(sel);
          controls.appendChild(wrap);
          inputs.push({ get: () => sel.value });
        } else if (col.lookup_table_key === 'partner_program') {
          // Two-step pick, same flow as everywhere else on the platform:
          // pick the partner first, then a filtered program list.
          const pWrap = fieldWrap('Partner');
          const pSel = document.createElement('select');
          pSel.className = 'form-input';
          pWrap.appendChild(pSel);
          const cWrap = fieldWrap(col.description || 'Program');
          const cSel = document.createElement('select');
          cSel.className = 'form-input';
          cSel.disabled = true;
          cSel.appendChild(new Option('Select a partner first', ''));
          cWrap.appendChild(cSel);

          const partResp = await fetch(`${API_BASE}/v1/partners?tenant_id=${user.tenant_id}`);
          if (!partResp.ok) throw new Error('Could not load partners');
          const partners = await partResp.json();
          pSel.appendChild(new Option('— Select —', ''));
          partners.forEach(p => pSel.appendChild(new Option(p.partner_name, p.partner_id)));

          pSel.addEventListener('change', async () => {
            cSel.innerHTML = '';
            if (!pSel.value) {
              cSel.disabled = true;
              cSel.appendChild(new Option('Select a partner first', ''));
              return;
            }
            const progResp = await fetch(`${API_BASE}/v1/partners/${pSel.value}/programs?tenant_id=${user.tenant_id}`);
            if (!progResp.ok) { showError('Could not load programs'); return; }
            const programs = await progResp.json();
            cSel.disabled = false;
            cSel.appendChild(new Option('— Select —', ''));
            programs.forEach(pr => cSel.appendChild(new Option(pr.program_name, pr.program_id)));
          });

          controls.appendChild(pWrap);
          controls.appendChild(cWrap);
          inputs.push({ get: () => cSel.value });
        } else {
          const wrap = fieldWrap(col.description || 'Value');
          const inp = document.createElement('input');
          inp.type = 'number';
          inp.className = 'form-input';
          wrap.appendChild(inp);
          controls.appendChild(wrap);
          inputs.push({ get: () => inp.value });
        }
      }

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'btn btn-primary';
      addBtn.textContent = '+ Add';
      addBtn.addEventListener('click', async () => {
        hideMessages();
        const values = inputs.map(i => i.get());
        if (values.some(v => v === '' || v === null)) {
          showError('Please fill in every field before adding');
          return;
        }
        try {
          const resp = await fetch(`${API_BASE}/v1/users/${userId}/molecule-rows/${def.molecule_key}?tenant_id=${user.tenant_id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ values })
          });
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || `Add failed (${resp.status})`);
          }
          await renderAssignmentRows(user, def);
        } catch (e) {
          showError(e.message);
        }
      });
      controls.appendChild(addBtn);
      section.appendChild(controls);

      await renderAssignmentRowsInto(list, user, def);
      return section;
    }

    function fieldWrap(labelText) {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'flex:1; min-width:140px;';
      const label = document.createElement('label');
      label.className = 'form-label';
      label.textContent = labelText;
      wrap.appendChild(label);
      return wrap;
    }

    async function renderAssignmentRows(user, def) {
      const list = document.getElementById(`assignList_${def.molecule_id}`);
      if (list) await renderAssignmentRowsInto(list, user, def);
    }

    async function renderAssignmentRowsInto(list, user, def) {
      const resp = await fetch(`${API_BASE}/v1/users/${userId}/molecule-rows/${def.molecule_key}?tenant_id=${user.tenant_id}`);
      if (!resp.ok) {
        list.innerHTML = '<div class="form-hint">Could not load current entries.</div>';
        return;
      }
      const rows = await resp.json();
      list.innerHTML = '';
      if (rows.length === 0) {
        list.innerHTML = '<div class="form-hint">No entries yet.</div>';
        return;
      }
      rows.forEach(row => {
        const line = document.createElement('div');
        line.style.cssText = 'display:flex; justify-content:space-between; align-items:center; padding:6px 8px; border:1px solid #e5e7eb; border-radius:4px; margin-bottom:6px; font-size:13px;';
        const text = document.createElement('span');
        text.textContent = row.display.join(' — ');
        line.appendChild(text);
        const rm = document.createElement('button');
        rm.type = 'button';
        rm.className = 'btn btn-sm btn-secondary';
        rm.textContent = 'Remove';
        rm.addEventListener('click', async () => {
          if (!confirm(`Remove "${row.display.join(' — ')}"?`)) return;
          hideMessages();
          try {
            const del = await fetch(`${API_BASE}/v1/users/${userId}/molecule-rows/${def.molecule_key}?tenant_id=${user.tenant_id}`, {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ values: row.values })
            });
            if (!del.ok) {
              const err = await del.json().catch(() => ({}));
              throw new Error(err.error || `Remove failed (${del.status})`);
            }
            await renderAssignmentRows(user, def);
          } catch (e) {
            showError(e.message);
          }
        });
        line.appendChild(rm);
        list.appendChild(line);
      });
    }
    
    // Handle user form submit
    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      
      const username = document.getElementById('username').value.trim();
      const displayName = document.getElementById('displayName').value.trim();
      const role = document.getElementById('role').value;
      const tenantId = document.getElementById('tenantId').value;
      const isActive = document.getElementById('status').value === 'true';
      
      if (!username || !displayName || !role) {
        showError('Please fill in all required fields');
        return;
      }
      
      try {
        if (isEdit) {
          // Update existing user
          const response = await fetch(`${API_BASE}/v1/users/${userId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              display_name: displayName,
              role: role,
              tenant_id: tenantId || null,
              is_active: isActive
            })
          });
          
          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Failed to update user');
          }
          
          showSuccess('User updated successfully');
        } else {
          // Create new user - need password
          const password = document.getElementById('password').value;
          const passwordConfirm = document.getElementById('passwordConfirm').value;
          
          if (!password) {
            showError('Password is required for new users');
            return;
          }
          
          if (password !== passwordConfirm) {
            showError('Passwords do not match');
            return;
          }
          
          if (password.length < 4) {
            showError('Password must be at least 4 characters');
            return;
          }
          
          const response = await fetch(`${API_BASE}/v1/users`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: username,
              password: password,
              display_name: displayName,
              role: role,
              tenant_id: tenantId || null
            })
          });
          
          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Failed to create user');
          }
          
          window.location.href = 'admin_users.html';
        }
        
      } catch (e) {
        showError(e.message);
      }
    });
    
    // Handle password reset (edit mode only)
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!isEdit) return;  // Password is part of create flow
      
      hideMessages();
      
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;
      
      if (!password) {
        showError('Please enter a new password');
        return;
      }
      
      if (password !== passwordConfirm) {
        showError('Passwords do not match');
        return;
      }
      
      if (password.length < 4) {
        showError('Password must be at least 4 characters');
        return;
      }
      
      try {
        const response = await fetch(`${API_BASE}/v1/users/${userId}/password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to reset password');
        }
        
        document.getElementById('password').value = '';
        document.getElementById('passwordConfirm').value = '';
        showSuccess('Password reset successfully');
        
      } catch (e) {
        showError(e.message);
      }
    });
    
    function showError(message) {
      const el = document.getElementById('errorMessage');
      el.textContent = message;
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function showSuccess(message) {
      const el = document.getElementById('successMessage');
      el.textContent = message;
      el.style.display = 'block';
    }
    
    function hideMessages() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }
    
    setupPage();
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
