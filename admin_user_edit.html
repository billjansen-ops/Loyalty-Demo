<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Edit User - System Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    /* LONGORIA: Compact layout with fixed header offset */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: calc(100vh - 48px) !important; min-height: auto !important; display: block; margin-top: 48px; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 12px 20px; }

    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }

    .form-container { max-width: 500px; }
    .form-section { background: white; border: 1px solid #e5e7eb; border-radius: 4px; padding: 12px; margin-bottom: 12px; }
    .form-section-title { font-weight: 600; font-size: 14px; margin: 0 0 12px 0; padding-bottom: 8px; border-bottom: 1px solid #e5e7eb; }

    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-weight: 600; margin-bottom: 3px; font-size: 12px; color: #374151; }
    .form-input { width: 100%; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; font-family: inherit; box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1); }
    .form-input[readonly] { background: #f9fafb; color: #6b7280; }
    .form-hint { font-size: 11px; color: #6b7280; margin-top: 2px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e7eb; }

    .error-message { padding: 8px; background: #fee2e2; border: 1px solid #fecaca; border-radius: 4px; color: #991b1b; margin-bottom: 12px; display: none; font-size: 13px; }
    .success-message { padding: 8px; background: #dcfce7; border: 1px solid #bbf7d0; border-radius: 4px; color: #065f46; margin-bottom: 12px; display: none; font-size: 13px; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'admin' });</script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title" id="pageTitle">👤 Create User</h1>
            <p class="page-subtitle" id="pageSubtitle">Add a new platform user</p>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <a href="admin_users.html" class="btn btn-secondary">← Back</a>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="form-container">
          <div id="errorMessage" class="error-message"></div>
          <div id="successMessage" class="success-message"></div>

          <div class="form-section">
            <h3 class="form-section-title">User Information</h3>
            <form id="userForm">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="username">Username</label>
                  <input type="text" id="username" class="form-input" placeholder="e.g., jsmith" required>
                  <div class="form-hint">Used for login</div>
                </div>

                <div class="form-group">
                  <label class="form-label" for="displayName">Display Name</label>
                  <input type="text" id="displayName" class="form-input" placeholder="e.g., John Smith" required>
                  <div class="form-hint">Shown in UI</div>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="role">Role</label>
                  <select id="role" class="form-input" required>
                    <option value="csr">CSR</option>
                    <option value="admin">Admin</option>
                    <option value="superuser">Superuser</option>
                  </select>
                  <div class="form-hint">Access level</div>
                </div>

                <div class="form-group">
                  <label class="form-label" for="tenantId">Tenant</label>
                  <select id="tenantId" class="form-input">
                    <option value="">All Tenants (Superuser)</option>
                  </select>
                  <div class="form-hint">Leave blank for superuser access</div>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="status">Status</label>
                <select id="status" class="form-input" style="width: 150px;">
                  <option value="true">Active</option>
                  <option value="false">Inactive</option>
                </select>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Save User</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='admin_users.html'">Cancel</button>
              </div>
            </form>
          </div>

          <!-- Password section - different for create vs edit -->
          <div class="form-section" id="passwordSection">
            <h3 class="form-section-title" id="passwordTitle">Set Password</h3>
            <form id="passwordForm">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="password">Password</label>
                  <input type="password" id="password" class="form-input" placeholder="Enter password" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="passwordConfirm">Confirm Password</label>
                  <input type="password" id="passwordConfirm" class="form-input" placeholder="Confirm password" required>
                </div>
              </div>
              <div class="form-hint" style="margin-bottom: 12px;">Minimum 4 characters</div>
              <button type="submit" class="btn btn-secondary" id="passwordBtn">Set Password</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script>
    const API_BASE = window.LP_STATE?.apiBase || window.location.origin;
    
    // Require superuser
    if (!Auth.requireSuperuser()) {
      // Redirect handled by requireSuperuser
    }
    
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    const isEdit = !!userId;
    
    // Load tenants for dropdown
    async function loadTenants() {
      try {
        const response = await fetch(`${API_BASE}/v1/tenants`);
        if (!response.ok) throw new Error('Failed to load tenants');
        
        const tenants = await response.json();
        const select = document.getElementById('tenantId');
        
        tenants.forEach(tenant => {
          const option = document.createElement('option');
          option.value = tenant.tenant_id;
          option.textContent = tenant.name;
          select.appendChild(option);
        });
      } catch (e) {
        console.error('Error loading tenants:', e);
      }
    }
    
    // Setup page for create vs edit
    async function setupPage() {
      await loadTenants();
      
      if (isEdit) {
        document.getElementById('pageTitle').textContent = '👤 Edit User';
        document.getElementById('pageSubtitle').textContent = 'Update user information';
        document.getElementById('passwordTitle').textContent = 'Reset Password';
        document.getElementById('passwordBtn').textContent = 'Reset Password';
        document.getElementById('password').required = false;
        document.getElementById('passwordConfirm').required = false;
        
        // Load user data
        await loadUserData();
      }
    }
    
    async function loadUserData() {
      try {
        const response = await fetch(`${API_BASE}/v1/users/${userId}`);
        if (!response.ok) throw new Error('Failed to load user');
        
        const user = await response.json();
        
        document.getElementById('username').value = user.username;
        document.getElementById('username').readOnly = true;  // Can't change username
        document.getElementById('displayName').value = user.display_name;
        document.getElementById('role').value = user.role;
        document.getElementById('tenantId').value = user.tenant_id || '';
        document.getElementById('status').value = user.is_active ? 'true' : 'false';
        
      } catch (e) {
        showError('Failed to load user: ' + e.message);
      }
    }
    
    // Handle user form submit
    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      
      const username = document.getElementById('username').value.trim();
      const displayName = document.getElementById('displayName').value.trim();
      const role = document.getElementById('role').value;
      const tenantId = document.getElementById('tenantId').value;
      const isActive = document.getElementById('status').value === 'true';
      
      if (!username || !displayName || !role) {
        showError('Please fill in all required fields');
        return;
      }
      
      try {
        if (isEdit) {
          // Update existing user
          const response = await fetch(`${API_BASE}/v1/users/${userId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              display_name: displayName,
              role: role,
              tenant_id: tenantId || null,
              is_active: isActive
            })
          });
          
          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Failed to update user');
          }
          
          showSuccess('User updated successfully');
        } else {
          // Create new user - need password
          const password = document.getElementById('password').value;
          const passwordConfirm = document.getElementById('passwordConfirm').value;
          
          if (!password) {
            showError('Password is required for new users');
            return;
          }
          
          if (password !== passwordConfirm) {
            showError('Passwords do not match');
            return;
          }
          
          if (password.length < 4) {
            showError('Password must be at least 4 characters');
            return;
          }
          
          const response = await fetch(`${API_BASE}/v1/users`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: username,
              password: password,
              display_name: displayName,
              role: role,
              tenant_id: tenantId || null
            })
          });
          
          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Failed to create user');
          }
          
          window.location.href = 'admin_users.html';
        }
        
      } catch (e) {
        showError(e.message);
      }
    });
    
    // Handle password reset (edit mode only)
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!isEdit) return;  // Password is part of create flow
      
      hideMessages();
      
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;
      
      if (!password) {
        showError('Please enter a new password');
        return;
      }
      
      if (password !== passwordConfirm) {
        showError('Passwords do not match');
        return;
      }
      
      if (password.length < 4) {
        showError('Password must be at least 4 characters');
        return;
      }
      
      try {
        const response = await fetch(`${API_BASE}/v1/users/${userId}/password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to reset password');
        }
        
        document.getElementById('password').value = '';
        document.getElementById('passwordConfirm').value = '';
        showSuccess('Password reset successfully');
        
      } catch (e) {
        showError(e.message);
      }
    });
    
    function showError(message) {
      const el = document.getElementById('errorMessage');
      el.textContent = message;
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function showSuccess(message) {
      const el = document.getElementById('successMessage');
      el.textContent = message;
      el.style.display = 'block';
    }
    
    function hideMessages() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }
    
    setupPage();
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
