<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PPII Scoring Weights - Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: calc(100vh - 48px) !important; min-height: auto !important; display: block; margin-top: 48px; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 16px 20px; padding-bottom: 80px; }
    .page-footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 20px; border-top: 1px solid #e5e7eb; background: white; display: flex; gap: 8px; justify-content: flex-end; z-index: 100; height: 56px; box-sizing: border-box; }

    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }

    .section { background: white; border: 1px solid #e5e7eb; border-radius: 6px; padding: 16px; margin-bottom: 14px; max-width: 820px; }
    .section h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #3b82f6; margin: 0 0 12px; }

    .weights-grid { display: grid; grid-template-columns: 150px 1fr 110px; gap: 14px 16px; align-items: center; }
    .weights-grid label { font-size: 13px; font-weight: 600; color: #111827; }
    .weights-grid .slider-wrap { display: flex; align-items: center; gap: 12px; }
    .weights-grid input[type=range] { flex: 1; accent-color: #3b82f6; }
    .weights-grid input[type=number] { width: 80px; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; text-align: right; }
    .weights-grid .bar { height: 6px; background: #dbeafe; border-radius: 3px; overflow: hidden; }
    .weights-grid .bar-fill { height: 100%; background: #3b82f6; transition: width 0.15s; }

    .sum-indicator { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-left: 10px; }
    .sum-indicator.ok { background: #dcfce7; color: #065f46; }
    .sum-indicator.bad { background: #fee2e2; color: #991b1b; }

    .ml-panel { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 12px 14px; font-size: 13px; }
    .ml-panel .drift-line { margin-top: 6px; color: #6b7280; }
    .ml-panel.warn { background: #fffbeb; border-color: #fbbf24; }
    .ml-panel.warn .drift-line { color: #92400e; font-weight: 600; }
    .ml-panel.err { background: #fee2e2; border-color: #fca5a5; }
    .ml-panel.err .drift-line { color: #991b1b; font-weight: 600; }

    .btn-retrain { background: #7c3aed; color: white; border-color: #6d28d9; }
    .btn-retrain:hover:not(:disabled) { background: #6d28d9; }
    .btn-retrain:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; border-color: #d1d5db; }

    /* Retrain log modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.55); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { width: 720px; max-height: 80vh; background: #0b1020; color: #e2e8f0; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; font-family: 'Monaco', 'Courier New', monospace; }
    .modal-head { padding: 10px 14px; background: #0f172a; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
    .modal-head h3 { margin: 0; font-size: 13px; font-weight: 600; color: #e2e8f0; font-family: system-ui, sans-serif; }
    .modal-body { flex: 1; overflow-y: auto; padding: 12px 14px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
    .modal-body .stderr { color: #f87171; }
    .modal-body .stdout { color: #e2e8f0; }
    .modal-body .done-ok { color: #4ade80; font-weight: 600; margin-top: 8px; }
    .modal-body .done-err { color: #f87171; font-weight: 600; margin-top: 8px; }
    .modal-foot { padding: 10px 14px; background: #0f172a; border-top: 1px solid #1e293b; display: flex; justify-content: flex-end; gap: 8px; }
    .modal-foot button { padding: 6px 14px; background: #3b82f6; color: white; border: 0; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .modal-foot button.secondary { background: #475569; }
    .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header" style="display:flex;align-items:center;gap:14px;">
        <a href="javascript:void(0)" id="backLink" onclick="goBack()"
           style="display:inline-flex;align-items:center;gap:4px;padding:6px 10px;font-size:13px;color:#3b82f6;text-decoration:none;border:1px solid #dbeafe;border-radius:4px;background:white;flex-shrink:0;cursor:pointer;">
          ← Back
        </a>
        <div style="flex:1;">
          <h1 class="page-title">PPII Scoring Weights</h1>
          <div class="page-subtitle">Adjust the relative weight of each input stream in the composite risk score</div>
        </div>
      </div>

      <div class="page-content">
        <!-- Stream weights editor -->
        <div class="section">
          <h2>Stream Weights
            <span id="sumIndicator" class="sum-indicator ok">Sum: 1.00 ✓</span>
          </h2>
          <div class="weights-grid" id="weightsGrid">
            <!-- Rows injected by JS -->
          </div>
        </div>

        <!-- ML calibration panel -->
        <div class="section">
          <h2>ML Model Calibration</h2>
          <div id="mlPanel" class="ml-panel">
            <div id="mlModelLine">Loading current model info…</div>
            <div id="mlDriftLine" class="drift-line"></div>
          </div>
          <div style="margin-top: 10px;">
            <button id="retrainBtn" class="btn btn-retrain" onclick="openRetrainModal()" disabled>
              Retrain ML
            </button>
            <span id="retrainHint" style="font-size: 12px; color: #6b7280; margin-left: 8px;">Save weights first to enable retrain.</span>
          </div>
        </div>
      </div>

      <div class="page-footer">
        <button class="btn btn-secondary" onclick="resetToSaved()">Reset to Saved</button>
        <button id="saveBtn" class="btn btn-primary" onclick="saveWeights()">💾 Save Weights</button>
      </div>
    </main>
  </div>

  <!-- Retrain log modal -->
  <div class="modal-overlay" id="retrainModal">
    <div class="modal">
      <div class="modal-head">
        <h3 id="retrainTitle"><span class="spinner"></span> Retraining ML…</h3>
      </div>
      <div class="modal-body" id="retrainLog"></div>
      <div class="modal-foot">
        <button class="secondary" id="retrainCancelBtn" onclick="cancelRetrain()">Cancel</button>
        <button id="retrainCloseBtn" onclick="closeRetrainModal()" style="display:none;">Close</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.LP_STATE?.apiBase || window.location.origin;

    let tenantId = null;
    // streams = array of { code, label, max_value, sort_order } returned by the
    // server. Drives row rendering and the keys we iterate everywhere else.
    let streams = [];
    // savedWeights = what's on the server. liveWeights = what user is editing.
    let savedWeights = {};
    let liveWeights = {};
    let modelInfo = null;
    let eventSource = null;

    function streamCodes() { return streams.map(s => s.code); }

    function el(id) { return document.getElementById(id); }

    function goBack() {
      // Prefer browser back (returns to whatever page they came from). Fall back
      // to the Insight dashboard if there's no history (e.g. direct bookmark).
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/verticals/workforce_monitoring/dashboard.html';
      }
    }

    function renderGrid() {
      const grid = el('weightsGrid');
      grid.innerHTML = '';
      for (const s of streams) {
        const key = s.code;
        const row = document.createElement('template');
        const pct = ((liveWeights[key] || 0) * 100).toFixed(1);
        row.innerHTML = `
          <label for="slider-${key}">${s.label}</label>
          <div class="slider-wrap">
            <input type="range" id="slider-${key}" min="0" max="100" step="0.1" value="${pct}" oninput="onSlider('${key}', this.value)">
            <div class="bar" style="width: 120px;"><div class="bar-fill" id="bar-${key}" style="width: ${pct}%"></div></div>
          </div>
          <div>
            <input type="number" id="num-${key}" min="0" max="100" step="0.1" value="${pct}" oninput="onNumber('${key}', this.value)">
            <span style="font-size:12px;color:#6b7280;">%</span>
          </div>
        `;
        while (row.content.firstChild) grid.appendChild(row.content.firstChild);
      }
      updateSumIndicator();
    }

    function onSlider(key, val) {
      liveWeights[key] = Number(val) / 100;
      el('num-' + key).value = Number(val).toFixed(1);
      el('bar-' + key).style.width = val + '%';
      updateSumIndicator();
      updateMlDrift();
      updateRetrainBtn();
    }

    function onNumber(key, val) {
      const n = Math.max(0, Math.min(100, Number(val) || 0));
      liveWeights[key] = n / 100;
      el('slider-' + key).value = n;
      el('bar-' + key).style.width = n + '%';
      updateSumIndicator();
      updateMlDrift();
      updateRetrainBtn();
    }

    function currentSum() {
      return streamCodes().reduce((s, k) => s + (liveWeights[k] || 0), 0);
    }

    function updateSumIndicator() {
      const s = currentSum();
      const ind = el('sumIndicator');
      ind.textContent = `Sum: ${s.toFixed(3)} ${Math.abs(s - 1) < 0.001 ? '✓' : '✗'}`;
      ind.className = 'sum-indicator ' + (Math.abs(s - 1) < 0.001 ? 'ok' : 'bad');
      el('saveBtn').disabled = Math.abs(s - 1) >= 0.001 || !hasUnsavedChanges();
    }

    function hasUnsavedChanges() {
      for (const k of streamCodes()) {
        if (Math.abs((liveWeights[k] || 0) - (savedWeights[k] || 0)) > 0.00001) return true;
      }
      return false;
    }

    function updateRetrainBtn() {
      // Retrain acts on SAVED weights, so disable while there are unsaved edits.
      const btn = el('retrainBtn');
      const hint = el('retrainHint');
      if (hasUnsavedChanges()) {
        btn.disabled = true;
        hint.textContent = 'Save weights first to enable retrain.';
      } else {
        btn.disabled = false;
        hint.textContent = '';
      }
    }

    function updateMlDrift() {
      const panel = el('mlPanel');
      const line = el('mlDriftLine');
      if (!modelInfo || !modelInfo.trained_against_ppii_weights) {
        line.textContent = '';
        panel.className = 'ml-panel';
        return;
      }
      const trained = modelInfo.trained_against_ppii_weights;
      let maxDrift = 0;
      // Compute drift across the union of currently-rendered stream codes and
      // codes the model was trained on, so adding/removing a stream relative to
      // the trained set surfaces as drift.
      const allCodes = new Set([...streamCodes(), ...Object.keys(trained)]);
      for (const k of allCodes) {
        maxDrift = Math.max(maxDrift, Math.abs((liveWeights[k] || 0) - (trained[k] || 0)));
      }
      const pct = (maxDrift * 100).toFixed(1);
      let bucket = '';
      if (maxDrift < 0.05) bucket = '✓ No retrain needed';
      else if (maxDrift < 0.10) bucket = '— Minor drift, retrain optional';
      else if (maxDrift < 0.15) bucket = '⚠ Noticeable drift, retrain recommended';
      else bucket = '⚠ Material drift — retrain before relying on scores';
      line.textContent = `Max drift from trained weights: ${pct}%. ${bucket}`;
      panel.className = 'ml-panel ' + (maxDrift >= 0.15 ? 'err' : maxDrift >= 0.10 ? 'warn' : '');
    }

    async function loadWeights() {
      tenantId = sessionStorage.getItem('tenant_id') || '1';
      try {
        const r = await fetch(`${API_BASE}/v1/tenants/${tenantId}/ppii-weights`, { credentials: 'include' });
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const data = await r.json();
        // Server returns `streams` (array with metadata) and `weights` (code→value
        // map). The streams array drives row rendering; the weights map drives
        // the slider values.
        streams = Array.isArray(data.streams) && data.streams.length
          ? data.streams.slice().sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0))
          : [];
        savedWeights = { ...(data.weights || {}) };
        liveWeights = { ...(data.weights || {}) };
        modelInfo = data.model_info || null;
        if (modelInfo) {
          el('mlModelLine').textContent = `Current ML model v${modelInfo.version} trained ${modelInfo.trained_at ? new Date(modelInfo.trained_at).toLocaleString() : '—'}`;
        } else {
          el('mlModelLine').textContent = 'No ML model on disk yet.';
        }
        renderGrid();
        updateMlDrift();
        updateRetrainBtn();
      } catch (e) {
        alert('Failed to load PPII weights: ' + e.message);
      }
    }

    async function saveWeights() {
      const s = currentSum();
      if (Math.abs(s - 1) >= 0.001) {
        alert(`Weights must sum to 1.0 (current: ${s.toFixed(4)})`);
        return;
      }
      try {
        const r = await fetch(`${API_BASE}/v1/tenants/${tenantId}/ppii-weights`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(liveWeights)
        });
        const body = await r.json();
        if (!r.ok) { alert('Save failed: ' + (body.error || r.statusText)); return; }
        savedWeights = { ...liveWeights };
        updateSumIndicator();
        updateRetrainBtn();
        // Note drift vs ML model (if server computed it)
        if (body.ml_calibration_drift_warning) {
          updateMlDrift();
        }
      } catch (e) {
        alert('Save failed: ' + e.message);
      }
    }

    function resetToSaved() {
      liveWeights = { ...savedWeights };
      renderGrid();
      updateMlDrift();
      updateRetrainBtn();
    }

    function openRetrainModal() {
      el('retrainLog').innerHTML = '';
      el('retrainTitle').innerHTML = '<span class="spinner"></span> Retraining ML…';
      el('retrainCancelBtn').style.display = '';
      el('retrainCloseBtn').style.display = 'none';
      el('retrainModal').classList.add('active');

      // Stream via EventSource
      eventSource = new EventSource(`${API_BASE}/v1/ml/retrain?tenant_id=${tenantId}`);
      eventSource.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        const log = el('retrainLog');
        if (msg.type === 'log') {
          const span = document.createElement('span');
          span.className = msg.stream === 'stderr' ? 'stderr' : 'stdout';
          span.textContent = msg.line + '\n';
          log.appendChild(span);
          log.scrollTop = log.scrollHeight;
        } else if (msg.type === 'done') {
          const done = document.createElement('div');
          done.className = msg.code === 0 ? 'done-ok' : 'done-err';
          done.textContent = msg.code === 0 ? `✓ Retrain complete (exit ${msg.code})` : `✗ Retrain failed (exit ${msg.code})`;
          log.appendChild(done);
          log.scrollTop = log.scrollHeight;
          el('retrainTitle').textContent = msg.code === 0 ? '✓ Retrain complete' : '✗ Retrain failed';
          el('retrainCancelBtn').style.display = 'none';
          el('retrainCloseBtn').style.display = '';
          eventSource.close();
          eventSource = null;
          if (msg.code === 0) {
            // Reload model info so the drift line updates
            loadWeights();
          }
        } else if (msg.type === 'error') {
          const err = document.createElement('div');
          err.className = 'stderr';
          err.textContent = 'ERROR: ' + msg.message + '\n';
          log.appendChild(err);
        }
      };
      eventSource.onerror = () => {
        el('retrainTitle').textContent = '✗ Connection error';
        el('retrainCancelBtn').style.display = 'none';
        el('retrainCloseBtn').style.display = '';
        if (eventSource) { eventSource.close(); eventSource = null; }
      };
    }

    function cancelRetrain() {
      if (eventSource) { eventSource.close(); eventSource = null; }
      closeRetrainModal();
    }

    function closeRetrainModal() {
      el('retrainModal').classList.remove('active');
    }

    loadWeights();
  </script>
</body>
</html>
