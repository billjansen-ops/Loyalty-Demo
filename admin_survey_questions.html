<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Question Pool - Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: 100vh !important; min-height: auto !important; display: block; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }
    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .toolbar select, .toolbar input { padding: 5px 10px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 4px; }
    .table-container { background: white; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .table-header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .table-header h2 { margin: 0; font-size: 14px; font-weight: 600; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #f9fafb; padding: 6px 10px; text-align: left; font-weight: 600; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e5e7eb; }
    .data-table td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; font-size: 13px; vertical-align: middle; }
    .data-table tbody tr:hover { background: #fafafa; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-inactive { background: #f3f4f6; color: #6b7280; }
    .badge-cat { background: #ede9fe; color: #5b21b6; }
    .badge-yes { background: #dbeafe; color: #1e40af; }
    .row-actions { display: flex; gap: 4px; }
    .btn-sm { padding: 3px 8px !important; font-size: 11px !important; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    .q-text { max-width: 420px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tenant-indicator { padding: 6px 10px; border-radius: 4px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .tenant-indicator.info { background: var(--primary-light, #dbeafe); color: var(--primary-dark, #1e40af); border: 1px solid var(--primary, #3b82f6); }
    .tenant-indicator.warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title">❓ Question Pool</h1>
            <p class="page-subtitle">Reusable questions available for assignment to surveys</p>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <div id="tenantIndicator"></div>
            <a href="admin_surveys.html" class="btn btn-secondary">← Surveys</a>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="table-container">
          <div class="table-header">
            <div style="display: flex; align-items: center; gap: 8px;">
              <h2>Questions</h2>
              <select id="categoryFilter" onchange="applyFilter()" style="padding:3px 8px; font-size:12px; border:1px solid #d1d5db; border-radius:4px;">
                <option value="">All Categories</option>
              </select>
            </div>
            <a href="admin_survey_question_edit.html" class="btn btn-primary">+ Add Question</a>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th style="width:120px;">Category</th>
                <th>Question</th>
                <th style="width:75px;">Required</th>
                <th style="width:75px;">Multi</th>
                <th style="width:65px;">Status</th>
                <th style="width:130px;">Actions</th>
              </tr>
            </thead>
            <tbody id="questionsBody">
              <tr><td colspan="6" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.LP_STATE?.apiBase || window.location.origin;
    let allQuestions = [];

    function showTenantIndicator() {
      const tenantId = sessionStorage.getItem('tenant_id');
      const tenantName = sessionStorage.getItem('tenant_name');
      const el = document.getElementById('tenantIndicator');
      if (!tenantId) {
        el.innerHTML = `<span class="tenant-indicator warning">⚠️ <a href="menu.html">Select tenant</a></span>`;
      } else {
        el.innerHTML = `<span class="tenant-indicator info">${tenantName}</span>`;
      }
    }

    async function loadCategories(tenantId) {
      try {
        const res = await fetch(`${API_BASE}/v1/survey-question-categories?tenant_id=${tenantId}`);
        if (!res.ok) return;
        const cats = await res.json();
        const sel = document.getElementById('categoryFilter');
        cats.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.link;
          opt.textContent = c.category_name;
          sel.appendChild(opt);
        });
      } catch {}
    }

    async function loadQuestions() {
      showTenantIndicator();
      const tenantId = sessionStorage.getItem('tenant_id');
      const tbody = document.getElementById('questionsBody');
      if (!tenantId) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Please select a tenant.</td></tr>';
        return;
      }
      await loadCategories(tenantId);
      try {
        const res = await fetch(`${API_BASE}/v1/survey-questions?tenant_id=${tenantId}`);
        if (!res.ok) throw new Error();
        allQuestions = await res.json();
        renderQuestions(allQuestions);
      } catch {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Error loading questions.</td></tr>';
      }
    }

    function renderQuestions(questions) {
      const tbody = document.getElementById('questionsBody');
      if (!questions.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No questions found.</td></tr>';
        return;
      }
      tbody.innerHTML = questions.map(q => `<tr>
        <td><span class="badge badge-cat">${q.category_code || q.category_name || '-'}</span></td>
        <td><span class="q-text" title="${q.question}">${q.question}</span></td>
        <td>${q.is_required ? '<span class="badge badge-yes">Yes</span>' : '<span style="color:#9ca3af">No</span>'}</td>
        <td>${q.allow_multiple ? '<span class="badge badge-yes">Yes</span>' : '<span style="color:#9ca3af">No</span>'}</td>
        <td><span class="badge ${q.status === 'A' ? 'badge-active' : 'badge-inactive'}">${q.status === 'A' ? 'Active' : 'Inactive'}</span></td>
        <td>
          <div class="row-actions">
            <button class="btn btn-sm btn-edit" onclick="editQuestion(${q.link})">✏️ Edit</button>
            <button class="btn btn-sm btn-delete" onclick="deleteQuestion(${q.link}, '${q.question.replace(/'/g,"\\'")}')">🗑️</button>
          </div>
        </td>
      </tr>`).join('');
    }

    function applyFilter() {
      const catLink = document.getElementById('categoryFilter').value;
      if (!catLink) { renderQuestions(allQuestions); return; }
      renderQuestions(allQuestions.filter(q => String(q.category_link) === catLink));
    }

    function editQuestion(link) {
      window.location.href = `admin_survey_question_edit.html?link=${link}`;
    }

    async function deleteQuestion(link, text) {
      if (!confirm(`Delete question?\n"${text}"`)) return;
      const tenantId = sessionStorage.getItem('tenant_id');
      try {
        const res = await fetch(`${API_BASE}/v1/survey-questions/${link}?tenant_id=${tenantId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error();
        loadQuestions();
      } catch {
        alert('Failed to delete question.');
      }
    }

    loadQuestions();
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
