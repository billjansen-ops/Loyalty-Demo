<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Bonus Rule - Admin</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    /* LONGORIA: Compact scroll layout */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: 100vh !important; min-height: auto !important; display: block; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; padding: 0 20px; }
    
    .page-header { flex-shrink: 0; padding: 12px 0; border-bottom: 1px solid #e5e7eb; margin-bottom: 12px; }
    .page-title { font-size: 20px; font-weight: 600; margin: 0; }
    .page-subtitle { font-size: 13px; color: var(--text-muted); margin: 4px 0 0; }

    .page-content { flex: 1; overflow-y: auto; padding-bottom: 16px; }

    .form-section { background: white; border: 1px solid #e5e7eb; border-radius: 4px; padding: 12px; margin-bottom: 8px; }
    .form-section.accented { background: #f8fafc; border-left: 3px solid #3b82f6; }
    .form-section.accented .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #3b82f6; margin-bottom: 10px; }
    .form-row { display: grid; gap: 8px; margin-bottom: 6px; }
    .form-row.three-col { grid-template-columns: 180px 1fr 140px; }
    .form-row.two-col { grid-template-columns: 1fr 1fr; }
    .form-row.four-col { grid-template-columns: 140px 140px 140px 120px; }
    .form-group { display: flex; flex-direction: column; }

    label { font-weight: 600; margin-bottom: 4px; font-size: 12px; }
    input, select { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; }
    input[readonly] { background: #f9fafb; color: #6b7280; }
    .section-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }

    .btn-test { background: #dcfce7; color: #065f46; border: 1px solid #86efac; }
    .btn-test:hover { background: #bbf7d0; }

    .tenant-indicator { padding: 6px 10px; border-radius: 4px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .tenant-indicator.info { background: var(--primary-light, #dbeafe); color: var(--primary-dark, #1e40af); border: 1px solid var(--primary, #3b82f6); }
    .tenant-indicator.warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }

    .results-list { display: flex; flex-direction: column; gap: 6px; }
    .result-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-item:hover { background: #f9fafb; }
    .result-type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-right: 10px;
    }
    .result-type-badge.points { background: #dcfce7; color: #166534; }
    .result-type-badge.external { background: #e0e7ff; color: #3730a3; }
    .result-details { flex: 1; font-size: 13px; }
    .result-actions { display: flex; gap: 6px; }
    .result-actions button { padding: 4px 8px; font-size: 12px; }

    .dialog-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .dialog-overlay.active { display: flex; }
    .dialog {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      width: min(560px, 92vw);
      max-height: 90vh;
      overflow-y: auto;
    }
    .dialog-header { padding: 16px 20px; border-bottom: 1px solid #e5e7eb; }
    .dialog-title { margin: 0; font-size: 18px; font-weight: 600; }
    .dialog-body { padding: 20px; }
    .dialog-footer {
      padding: 16px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title">🎁 Edit Bonus Rule</h1>
            <p class="page-subtitle">Update bonus rule configuration</p>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <div id="tenantIndicator"></div>
            <a href="admin_bonuses.html" class="btn btn-secondary">← Back to Bonuses</a>
          </div>
        </div>
      </div>

      <div class="page-content">

      <!-- Bonus Header Fields -->
      <div class="form-section accented" style="flex-shrink: 0;">
        <div class="section-label">Definition</div>
        <div class="form-row three-col">
          <div class="form-group">
            <label>Bonus Code</label>
            <input type="text" id="bonusCode" value="" placeholder="e.g., DBL_MILES" style="text-transform: uppercase" oninput="this.value = this.value.toUpperCase()">
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="bonusDescription" value="bills test bonus">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="status">
              <option value="active" selected>Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>

        <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="startDate" value="2025-11-01">
          </div>
          <div class="form-group">
            <label>End Date</label>
            <input type="date" id="endDate" value="2025-11-15">
          </div>
        </div>

        <!-- Day of Week Selection -->
        <div class="form-row" style="grid-template-columns: 1fr; margin-top: 8px;">
          <div class="form-group">
            <label style="margin-bottom: 8px;">Apply On:</label>
            <div style="display: flex; gap: 16px; flex-wrap: wrap;">
              <label style="display: flex; align-items: center; gap: 6px; font-weight: 400; margin: 0; cursor: pointer;">
                <input type="checkbox" id="day_monday" value="1" checked>
                Monday
              </label>
              <label style="display: flex; align-items: center; gap: 6px; font-weight: 400; margin: 0; cursor: pointer;">
                <input type="checkbox" id="day_tuesday" value="2" checked>
                Tuesday
              </label>
              <label style="display: flex; align-items: center; gap: 6px; font-weight: 400; margin: 0; cursor: pointer;">
                <input type="checkbox" id="day_wednesday" value="3" checked>
                Wednesday
              </label>
              <label style="display: flex; align-items: center; gap: 6px; font-weight: 400; margin: 0; cursor: pointer;">
                <input type="checkbox" id="day_thursday" value="4" checked>
                Thursday
              </label>
              <label style="display: flex; align-items: center; gap: 6px; font-weight: 400; margin: 0; cursor: pointer;">
                <input type="checkbox" id="day_friday" value="5" checked>
                Friday
              </label>
              <label style="display: flex; align-items: center; gap: 6px; font-weight: 400; margin: 0; cursor: pointer;">
                <input type="checkbox" id="day_saturday" value="6" checked>
                Saturday
              </label>
              <label style="display: flex; align-items: center; gap: 6px; font-weight: 400; margin: 0; cursor: pointer;">
                <input type="checkbox" id="day_sunday" value="0" checked>
                Sunday
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Criteria Section -->
      <div class="form-section accented">
        <div class="section-label">Criteria</div>
        <div style="display: flex; align-items: center; gap: 12px;">
          <span id="criteriaCount" style="color: #6b7280; font-size: 14px;">This bonus has 0 criteria</span>
          <button class="btn btn-secondary btn-sm" onclick="openCriteriaOverlay()">
            Manage Criteria
          </button>
        </div>
      </div>

      <!-- Results Section -->
      <div class="form-section accented">
        <div class="section-label">Results</div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <span style="color: #6b7280; font-size: 14px;">Configure one or more point or external results for this bonus.</span>
          <button class="btn btn-secondary" onclick="openResultDialog()" style="background: #dbeafe; color: #1e40af; border-color: #93c5fd;">
            + Add Result
          </button>
        </div>
        <div id="resultsList" class="results-list">
          <div class="empty">No results configured yet</div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="form-section">
        <div style="display: flex; justify-content: flex-end; gap: 8px;">
          <a href="admin_bonuses.html" class="btn btn-secondary">← Back to Bonuses</a>
          <button class="btn btn-secondary" id="describeBtn" onclick="describeThisBonus()" style="display:none;">📝 Describe</button>
          <button class="btn btn-test" onclick="testThisBonus()" title="Test this bonus">✅ Test</button>
          <button class="btn btn-secondary" id="statsBtn" onclick="showBonusStats()" style="display:none;">📊 Stats</button>
          <button class="btn btn-primary" onclick="saveBonus()">Save Bonus</button>
        </div>
      </div>
      </div><!-- end page-content -->
    </main>

  </div>

  <script src="criteria-editor.js"></script>
  <script>
    window.API_BASE = window.LP_STATE?.apiBase || window.location.origin;
    CriteriaEditor.init('bonus');

    let resultsList = [];
    let editingResultIndex = null;

    function getCriteriaOverlaySubtitle() {
      const bonusCode = document.getElementById('bonusCode').value;
      const bonusDescription = document.getElementById('bonusDescription').value;
      return bonusCode ? `${bonusCode} - ${bonusDescription}` : '';
    }

    function renderResults() {
      const container = document.getElementById('resultsList');
      if (!resultsList.length) {
        container.innerHTML = '<div class="empty">No results configured yet</div>';
        return;
      }

      container.innerHTML = resultsList.map((result, index) => {
        const badge = `<span class="result-type-badge ${result.result_type}">${result.result_type}</span>`;
        const detail = result.result_type === 'points'
          ? `${result.amount_type === 'percent' ? `${result.result_amount}%` : Number(result.result_amount || 0).toLocaleString()} ${result.point_type_name || 'default points'}`
          : (result.action_name || result.result_description || 'External action');

        return `
          <div class="result-item">
            <div class="result-details">${badge}${detail}</div>
            <div class="result-actions">
              <button class="btn btn-secondary" onclick="openResultDialog(${index})">Edit</button>
              <button class="btn btn-secondary" onclick="deleteResult(${index})">Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function openResultDialog(index = null) {
      editingResultIndex = index;
      const dialog = document.getElementById('resultDialogOverlay');
      const title = document.getElementById('resultDialogTitle');

      if (index === null) {
        title.textContent = 'Add Bonus Result';
        document.getElementById('resultType').value = 'points';
        document.getElementById('resultAmountType').value = 'fixed';
        document.getElementById('resultAmount').value = '';
        document.getElementById('resultPointType').value = '';
        document.getElementById('resultExternalAction').value = '';
        document.getElementById('resultDescription').value = '';
      } else {
        const result = resultsList[index];
        title.textContent = 'Edit Bonus Result';
        document.getElementById('resultType').value = result.result_type || 'points';
        document.getElementById('resultAmountType').value = result.amount_type || 'fixed';
        document.getElementById('resultAmount').value = result.result_amount || '';
        document.getElementById('resultPointType').value = result.point_type_id || '';
        document.getElementById('resultExternalAction').value = result.result_reference_id || '';
        document.getElementById('resultDescription').value = result.result_description || '';
      }

      onResultTypeChange();
      dialog.classList.add('active');
    }

    function closeResultDialog() {
      document.getElementById('resultDialogOverlay').classList.remove('active');
      editingResultIndex = null;
    }

    function onResultTypeChange() {
      const type = document.getElementById('resultType').value;
      document.getElementById('pointsResultFields').style.display = type === 'points' ? 'block' : 'none';
      document.getElementById('externalResultFields').style.display = type === 'external' ? 'block' : 'none';
    }

    function saveResult() {
      const type = document.getElementById('resultType').value;
      const result = {
        result_type: type,
        sort_order: editingResultIndex !== null ? editingResultIndex : resultsList.length
      };

      if (type === 'points') {
        const amount = parseFloat(document.getElementById('resultAmount').value);
        if (!amount || amount <= 0) {
          alert('Please enter a positive amount');
          return;
        }
        result.amount_type = document.getElementById('resultAmountType').value;
        result.result_amount = amount;
        result.point_type_id = document.getElementById('resultPointType').value ? parseInt(document.getElementById('resultPointType').value) : null;
        result.point_type_name = document.getElementById('resultPointType').selectedOptions[0]?.textContent || 'default points';
        result.result_description = null;
        result.result_reference_id = null;
      } else {
        const actionId = document.getElementById('resultExternalAction').value;
        if (!actionId) {
          alert('Please select an external action');
          return;
        }
        result.result_reference_id = parseInt(actionId);
        result.result_description = document.getElementById('resultDescription').value || null;
        result.action_name = document.getElementById('resultExternalAction').selectedOptions[0]?.textContent || 'External action';
        result.result_amount = null;
        result.amount_type = null;
        result.point_type_id = null;
      }

      if (editingResultIndex !== null) {
        resultsList[editingResultIndex] = { ...resultsList[editingResultIndex], ...result };
      } else {
        resultsList.push(result);
      }

      renderResults();
      closeResultDialog();
    }

    function deleteResult(index) {
      if (!confirm('Delete this result?')) return;
      resultsList.splice(index, 1);
      resultsList = resultsList.map((result, idx) => ({ ...result, sort_order: idx }));
      renderResults();
    }

    async function loadPointTypes() {
      const tenantId = sessionStorage.getItem('tenant_id') || '1';
      const res = await fetch(`${window.API_BASE}/v1/point-types?tenant_id=${tenantId}`);
      if (!res.ok) return;
      const pointTypes = await res.json();
      const select = document.getElementById('resultPointType');
      select.innerHTML = '<option value="">-- Use Default --</option>';
      pointTypes.forEach(pt => {
        const opt = document.createElement('option');
        opt.value = pt.point_type_id;
        opt.textContent = pt.point_type_name;
        select.appendChild(opt);
      });
    }

    async function loadExternalActions() {
      const tenantId = sessionStorage.getItem('tenant_id') || '1';
      const res = await fetch(`${window.API_BASE}/v1/external-actions?tenant_id=${tenantId}`);
      if (!res.ok) return;
      const actions = await res.json();
      const select = document.getElementById('resultExternalAction');
      select.innerHTML = '<option value="">Select action...</option>';
      actions.filter(a => a.is_active !== false).forEach(action => {
        const opt = document.createElement('option');
        opt.value = action.action_id;
        opt.textContent = action.action_name;
        select.appendChild(opt);
      });
    }

    async function loadResults(bonusId) {
      if (!bonusId) {
        resultsList = [];
        renderResults();
        return;
      }
      const tenantId = sessionStorage.getItem('tenant_id') || '1';
      const res = await fetch(`${window.API_BASE}/v1/bonuses/${bonusId}/results?tenant_id=${tenantId}`);
      resultsList = res.ok ? await res.json() : [];
      renderResults();
    }

    function testThisBonus() {
      const bonusCode = document.getElementById('bonusCode').value;
      if (!bonusCode) {
        alert('Please enter a bonus code first');
        return;
      }
      SimulationModal.openChoice('bonus', bonusCode);
    }

    async function saveBonus() {
      const bonusCode = document.getElementById('bonusCode').value;
      const bonusDescription = document.getElementById('bonusDescription').value;
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const status = document.getElementById('status').value;
      const tenantId = sessionStorage.getItem('tenant_id');

      if (!bonusCode || !bonusDescription || !startDate) {
        alert('Please fill in the definition fields');
        return;
      }
      if (!tenantId) {
        alert('Please select a tenant first');
        window.location.href = 'menu.html';
        return;
      }
      if (!resultsList.length) {
        alert('Please add at least one result');
        return;
      }

      const firstPointResult = resultsList.find(r => r.result_type === 'points');
      const bonusData = {
        bonus_code: bonusCode,
        bonus_description: bonusDescription,
        bonus_type: firstPointResult?.amount_type || 'fixed',
        bonus_amount: firstPointResult ? Number(firstPointResult.result_amount) || 0 : 0,
        start_date: startDate,
        end_date: endDate || null,
        is_active: status === 'active',
        tenant_id: parseInt(tenantId),
        apply_sunday: document.getElementById('day_sunday').checked,
        apply_monday: document.getElementById('day_monday').checked,
        apply_tuesday: document.getElementById('day_tuesday').checked,
        apply_wednesday: document.getElementById('day_wednesday').checked,
        apply_thursday: document.getElementById('day_thursday').checked,
        apply_friday: document.getElementById('day_friday').checked,
        apply_saturday: document.getElementById('day_saturday').checked,
        point_type_id: firstPointResult?.point_type_id || null
      };

      try {
        const bonusRes = await fetch(`${window.API_BASE}/v1/bonuses`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bonusData)
        });
        if (!bonusRes.ok) {
          const err = await bonusRes.json();
          throw new Error(err.error || 'Save failed');
        }

        const savedBonus = await bonusRes.json();
        const bonusId = savedBonus.bonus?.bonus_id || savedBonus.bonus_id;
        if (!bonusId) throw new Error('Failed to get bonus ID from save');

        const existingCriteria = await fetch(`${window.API_BASE}/v1/bonuses/${bonusId}/criteria`);
        if (existingCriteria.ok) {
          const existing = await existingCriteria.json();
          for (const c of existing) {
            await fetch(`${window.API_BASE}/v1/bonuses/${bonusId}/criteria/${c.id}`, { method: 'DELETE' });
          }
        }

        for (let i = 0; i < CriteriaEditor.criteriaList.length; i++) {
          const c = CriteriaEditor.criteriaList[i];
          const criteriaRes = await fetch(`${window.API_BASE}/v1/bonuses/${bonusId}/criteria`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              source: c.source,
              molecule: c.molecule_key,
              operator: c.operator,
              value: c.value,
              label: c.label,
              param1_value: c.param1_value,
              param2_value: c.param2_value,
              param3_value: c.param3_value,
              param4_value: c.param4_value
            })
          });
          if (criteriaRes.ok) {
            const savedCriteria = await criteriaRes.json();
            if (i < CriteriaEditor.criteriaList.length - 1 && c.joiner) {
              await fetch(`${window.API_BASE}/v1/bonuses/${bonusId}/criteria/${savedCriteria.criteria_id}/joiner`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ joiner: c.joiner })
              });
            }
          }
        }

        const existingResultsRes = await fetch(`${window.API_BASE}/v1/bonuses/${bonusId}/results?tenant_id=${tenantId}`);
        if (existingResultsRes.ok) {
          const existingResults = await existingResultsRes.json();
          for (const result of existingResults) {
            await fetch(`${window.API_BASE}/v1/bonuses/${bonusId}/results/${result.bonus_result_id}?tenant_id=${tenantId}`, {
              method: 'DELETE'
            });
          }
        }

        for (let i = 0; i < resultsList.length; i++) {
          const result = { ...resultsList[i], tenant_id: parseInt(tenantId), sort_order: i };
          await fetch(`${window.API_BASE}/v1/bonuses/${bonusId}/results`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(result)
          });
        }

        alert('Bonus saved successfully!');
        window.location.href = 'admin_bonuses.html';
      } catch (err) {
        console.error('Error saving bonus:', err);
        alert('Failed to save bonus: ' + err.message);
      }
    }

    function showTenantIndicator() {
      const tenantId = sessionStorage.getItem('tenant_id');
      const tenantName = sessionStorage.getItem('tenant_name');
      const indicator = document.getElementById('tenantIndicator');
      indicator.innerHTML = tenantId
        ? `<span class="tenant-indicator info">${tenantName}</span>`
        : `<span class="tenant-indicator warning">⚠️ <a href="menu.html">Select tenant</a></span>`;
    }

    function updatePageTitle() {
      const bonusCode = new URLSearchParams(window.location.search).get('code');
      const bonusCodeInput = document.getElementById('bonusCode');
      if (!bonusCode) {
        document.querySelector('.page-title').textContent = 'Create Bonus Rule';
        document.querySelector('.page-subtitle').textContent = 'Configure a new bonus rule';
        bonusCodeInput.readOnly = false;
        bonusCodeInput.style.background = 'white';
      } else {
        bonusCodeInput.readOnly = true;
        bonusCodeInput.style.background = '#f3f4f6';
      }
    }

    function clearFormForCreate() {
      const bonusCode = new URLSearchParams(window.location.search).get('code');
      if (!bonusCode) {
        document.getElementById('bonusCode').value = '';
        document.getElementById('bonusDescription').value = '';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('status').value = 'active';
        resultsList = [];
        renderResults();
      }
    }

    async function loadBonusData() {
      const bonusCode = new URLSearchParams(window.location.search).get('code');
      await loadPointTypes();
      await loadExternalActions();

      if (!bonusCode) return;

      try {
        const tenantId = sessionStorage.getItem('tenant_id') || '1';
        const bonusesRes = await fetch(`${window.API_BASE}/v1/bonuses?tenant_id=${tenantId}`);
        const bonuses = await bonusesRes.json();
        const bonus = bonuses.find(b => b.bonus_code === bonusCode);

        if (!bonus) {
          alert('Bonus not found');
          window.location.href = 'admin_bonuses.html';
          return;
        }

        const formatDate = (dateVal) => dateVal ? String(dateVal).split('T')[0] : '';

        window.currentBonus = {
          id: bonus.bonus_id,
          code: bonus.bonus_code,
          startDate: formatDate(bonus.start_date)
        };

        document.getElementById('bonusCode').value = bonus.bonus_code || '';
        document.getElementById('bonusDescription').value = bonus.bonus_description || '';
        document.getElementById('startDate').value = formatDate(bonus.start_date);
        document.getElementById('endDate').value = formatDate(bonus.end_date);
        document.getElementById('status').value = bonus.is_active ? 'active' : 'inactive';
        document.getElementById('day_sunday').checked = bonus.apply_sunday !== false;
        document.getElementById('day_monday').checked = bonus.apply_monday !== false;
        document.getElementById('day_tuesday').checked = bonus.apply_tuesday !== false;
        document.getElementById('day_wednesday').checked = bonus.apply_wednesday !== false;
        document.getElementById('day_thursday').checked = bonus.apply_thursday !== false;
        document.getElementById('day_friday').checked = bonus.apply_friday !== false;
        document.getElementById('day_saturday').checked = bonus.apply_saturday !== false;

        document.getElementById('statsBtn').style.display = 'inline-block';
        document.getElementById('describeBtn').style.display = 'inline-block';

        await loadResults(bonus.bonus_id);
      } catch (error) {
        console.error('Error loading bonus:', error);
        alert('Failed to load bonus data');
      }
    }

    function showBonusStats() {
      if (window.currentBonus) {
        BonusStatsModal.open(window.currentBonus.id, window.currentBonus.code, window.currentBonus.startDate);
      }
    }

    function describeThisBonus() {
      const bonus = {
        bonus_code: document.getElementById('bonusCode').value,
        bonus_description: document.getElementById('bonusDescription').value,
        start_date: document.getElementById('startDate').value,
        end_date: document.getElementById('endDate').value,
        results: resultsList
      };

      const modal = document.getElementById('describeModal');
      modal.style.display = 'flex';
      document.getElementById('describeModalTitle').textContent = `Bonus: ${bonus.bonus_code || 'Preview'}`;
      document.getElementById('describeModalContent').innerHTML = `
        <div style="font-size: 15px; line-height: 1.8; color: #374151;">
          ${generateBonusDescription(bonus, CriteriaEditor.criteriaList)}
        </div>
      `;
    }

    function generateBonusDescription(bonus, criteria) {
      const startDate = bonus.start_date ? formatDateNice(bonus.start_date) : null;
      const endDate = bonus.end_date ? formatDateNice(bonus.end_date) : null;
      let datePhrase = '';
      if (startDate && endDate) datePhrase = `between ${startDate} and ${endDate}`;
      else if (startDate) datePhrase = `starting ${startDate}`;
      else if (endDate) datePhrase = `until ${endDate}`;

      const activityCriteria = criteria.filter(c => c.source === 'Activity');
      const memberCriteria = criteria.filter(c => c.source === 'Member');
      let activityPhrase = 'Complete an activity';
      if (activityCriteria.length > 0) activityPhrase = activityCriteria.map(c => describeCriterion(c)).join(' and ');
      let memberPhrase = '';
      if (memberCriteria.length > 0) memberPhrase = memberCriteria.map(c => describeCriterion(c)).join(' and ');

      const resultPhrase = (bonus.results || []).map(result => {
        if (result.result_type === 'points') {
          return result.amount_type === 'percent'
            ? `earn a <strong>${result.result_amount}% bonus</strong>${result.point_type_name ? ` in ${result.point_type_name}` : ''}`
            : `earn <strong>${Number(result.result_amount || 0).toLocaleString()} bonus points</strong>${result.point_type_name ? ` in ${result.point_type_name}` : ''}`;
        }
        return `trigger <strong>${result.action_name || result.result_description || 'an external action'}</strong>`;
      }).join(' and ');

      let description = datePhrase ? `<p>${activityPhrase} ${datePhrase}.</p>` : `<p>${activityPhrase}.</p>`;
      description += memberPhrase ? `<p>If you ${memberPhrase}, you will ${resultPhrase}.</p>` : `<p>You will ${resultPhrase}.</p>`;
      if (bonus.bonus_description) {
        description = `<p style="font-weight: 600; margin-bottom: 12px;">${bonus.bonus_description}</p>` + description;
      }
      return description;
    }

    function describeCriterion(criterion) {
      const mol = criterion.molecule_key || criterion.molecule || '';
      const op = criterion.operator || '=';
      const val = criterion.value || '';
      const label = criterion.label || mol.replace(/_/g, ' ');
      const opText = { '=': 'is', '!=': 'is not', '>': 'is greater than', '>=': 'is at least', '<': 'is less than', '<=': 'is at most', 'in': 'is one of', 'not in': 'is not one of' };
      if (mol === 'tier') return `are <strong>${val}</strong> tier`;
      if (mol === 'carrier') return `fly on <strong>${val}</strong>`;
      if (mol === 'origin') return `depart from <strong>${val}</strong>`;
      if (mol === 'destination') return `fly to <strong>${val}</strong>`;
      if (mol === 'fare_class') return `book fare class <strong>${val}</strong>`;
      if (mol === 'day_of_week') return `fly on <strong>${formatDayOfWeek(val)}</strong>`;
      return `${label} ${opText[op] || op} <strong>${val}</strong>`;
    }

    function formatDayOfWeek(val) {
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const raw = String(val || '');
      if (raw.includes(',')) {
        return raw.split(',').map(d => days[parseInt(d.trim(), 10)] || d).join(', ');
      }
      return days[parseInt(raw, 10)] || raw;
    }

    function formatDateNice(dateVal) {
      if (!dateVal) return null;
      try {
        return new Date(String(dateVal).split('T')[0] + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      } catch {
        return String(dateVal);
      }
    }

    function closeDescribeModal() {
      document.getElementById('describeModal').style.display = 'none';
    }

    document.getElementById('describeModal')?.addEventListener('click', function(e) {
      if (e.target === this) closeDescribeModal();
    });
    document.getElementById('resultDialogOverlay')?.addEventListener('click', function(e) {
      if (e.target === this) closeResultDialog();
    });

    updatePageTitle();
    (async function() {
      clearFormForCreate();
      await loadBonusData();
      showTenantIndicator();
      await CriteriaEditor.loadCriteria(window.currentBonus?.id);
      renderResults();
    })();
  </script>
