<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clone Configuration - System Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    .admin-section {
      max-width: 1400px;
      margin: 0 auto;
    }

    .page-header {
      padding: 6px 0 4px 0 !important;
      margin-bottom: 6px !important;
    }

    .page-content {
      padding-top: 0 !important;
    }
    
    .page-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 4px;
      color: var(--text-primary);
    }

    .page-description {
      color: var(--text-muted);
      margin: 0 0 6px !important;
    }

    .tenant-selector {
      display: flex;
      gap: 20px;
      align-items: flex-end;
      margin-bottom: 16px;
      padding: 12px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .tenant-selector .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tenant-selector label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .tenant-selector select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      min-width: 200px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .panel {
      background: white;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .panel-header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f9fafb;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }

    .panel-body {
      max-height: calc(100vh - 320px);
      overflow-y: auto;
    }

    .item-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .item-list li {
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .item-list li:hover {
      background: #f9fafb;
    }

    .item-list input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .item-info {
      flex: 1;
    }

    .item-key {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
    }

    .item-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .item-badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 8px;
      background: #e0f2fe;
      color: #0369a1;
    }

    .item-exists {
      font-size: 11px;
      color: #dc2626;
      font-style: italic;
    }

    .select-actions {
      display: flex;
      gap: 8px;
    }

    .select-actions button {
      font-size: 11px;
      padding: 2px 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }

    .select-actions button:hover {
      background: #f0f0f0;
    }

    .action-bar {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
    }

    .status-message {
      padding: 12px;
      border-radius: 6px;
      margin-top: 12px;
      display: none;
    }

    .status-message.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .status-message.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
    
    /* LONGORIA: Compact layout with fixed header offset */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: calc(100vh - 48px) !important; min-height: auto !important; display: block; margin-top: 48px; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 12px 20px; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'admin' });</script>
  <div class="app-layout">
    <main class="main-content">
      <header class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title">🔄 Clone Configuration</h1>
            <p class="page-description">Copy system parameters and molecules from one tenant to another</p>
          </div>
          <a href="super_user.html" class="btn btn-secondary">← Back</a>
        </div>
      </header>

      <div class="page-content">
        <section class="admin-section">
          
          <div class="tenant-selector">
            <div class="form-group">
              <label>Source Tenant</label>
              <select id="sourceTenant">
                <option value="">-- Select --</option>
              </select>
            </div>
            <div class="form-group">
              <label>Target Tenant</label>
              <select id="targetTenant">
                <option value="">-- Select --</option>
              </select>
            </div>
            <button class="btn btn-primary" onclick="loadItems()">Load Items</button>
          </div>

          <div class="panels">
            <!-- Sysparms Panel -->
            <div class="panel">
              <div class="panel-header">
                <h2>System Parameters</h2>
                <div class="select-actions">
                  <button onclick="selectAll('sysparm')">Select All</button>
                  <button onclick="selectNone('sysparm')">Select None</button>
                  <button onclick="selectNew('sysparm')">Select New Only</button>
                </div>
              </div>
              <div class="panel-body">
                <ul class="item-list" id="sysparmList">
                  <li class="empty-state">Select tenants and click Load Items</li>
                </ul>
              </div>
            </div>

            <!-- Molecules Panel -->
            <div class="panel">
              <div class="panel-header">
                <h2>Molecules</h2>
                <div class="select-actions">
                  <button onclick="selectAll('molecule')">Select All</button>
                  <button onclick="selectNone('molecule')">Select None</button>
                  <button onclick="selectNew('molecule')">Select New Only</button>
                </div>
              </div>
              <div class="panel-body">
                <ul class="item-list" id="moleculeList">
                  <li class="empty-state">Select tenants and click Load Items</li>
                </ul>
              </div>
            </div>
          </div>

          <div class="action-bar">
            <span id="selectionCount" style="color: var(--text-muted); font-size: 13px;"></span>
            <button class="btn btn-primary" onclick="cloneSelected()" id="cloneBtn" disabled>Clone Selected Items</button>
          </div>

          <div id="statusMessage" class="status-message"></div>

        </section>
      </div>
    </main>
  </div>

  <script src="nav.js"></script>
  <script src="auth.js"></script>
  <script>
    const API_BASE = window.LP_STATE?.apiBase || 'http://127.0.0.1:4001';
    
    let sourceSysparms = [];
    let sourceMolecules = [];
    let targetSysparmKeys = new Set();
    let targetMoleculeKeys = new Set();

    // Require superuser
    if (!Auth.requireSuperuser()) {
      // Redirect handled
    }

    // Load tenants
    async function loadTenants() {
      try {
        const response = await fetch(`${API_BASE}/v1/tenants`);
        const tenants = await response.json();
        
        const sourceSelect = document.getElementById('sourceTenant');
        const targetSelect = document.getElementById('targetTenant');
        
        tenants.forEach(t => {
          sourceSelect.innerHTML += `<option value="${t.tenant_id}">${t.name}</option>`;
          targetSelect.innerHTML += `<option value="${t.tenant_id}">${t.name}</option>`;
        });
      } catch (e) {
        console.error('Error loading tenants:', e);
      }
    }

    // Load items from source and check what exists in target
    async function loadItems() {
      const sourceId = document.getElementById('sourceTenant').value;
      const targetId = document.getElementById('targetTenant').value;
      
      if (!sourceId || !targetId) {
        alert('Please select both source and target tenants');
        return;
      }
      
      if (sourceId === targetId) {
        alert('Source and target must be different tenants');
        return;
      }

      try {
        // Load source sysparms
        const sysparmRes = await fetch(`${API_BASE}/v1/sysparms?tenant_id=${sourceId}`);
        sourceSysparms = await sysparmRes.json();
        
        // Load source molecules
        const moleculeRes = await fetch(`${API_BASE}/v1/molecules?tenant_id=${sourceId}`);
        sourceMolecules = await moleculeRes.json();
        
        // Load target sysparms to check for duplicates
        const targetSysparmRes = await fetch(`${API_BASE}/v1/sysparms?tenant_id=${targetId}`);
        const targetSysparms = await targetSysparmRes.json();
        targetSysparmKeys = new Set(targetSysparms.map(s => s.sysparm_key));
        
        // Load target molecules to check for duplicates
        const targetMoleculeRes = await fetch(`${API_BASE}/v1/molecules?tenant_id=${targetId}`);
        const targetMolecules = await targetMoleculeRes.json();
        targetMoleculeKeys = new Set(targetMolecules.map(m => m.molecule_key));
        
        renderSysparms();
        renderMolecules();
        updateSelectionCount();
        
      } catch (e) {
        console.error('Error loading items:', e);
        alert('Error loading items: ' + e.message);
      }
    }

    function renderSysparms() {
      const list = document.getElementById('sysparmList');
      
      if (sourceSysparms.length === 0) {
        list.innerHTML = '<li class="empty-state">No system parameters found</li>';
        return;
      }
      
      list.innerHTML = sourceSysparms.map(s => {
        const exists = targetSysparmKeys.has(s.sysparm_key);
        return `
          <li>
            <input type="checkbox" class="sysparm-check" data-id="${s.sysparm_id}" data-key="${s.sysparm_key}" 
                   ${exists ? '' : 'checked'} onchange="updateSelectionCount()">
            <div class="item-info">
              <div class="item-key">${s.sysparm_key}</div>
              <div class="item-label">${s.label || ''}</div>
            </div>
            <span class="item-badge">${s.detail_count || 0} values</span>
            ${exists ? '<span class="item-exists">exists in target</span>' : ''}
          </li>
        `;
      }).join('');
    }

    function renderMolecules() {
      const list = document.getElementById('moleculeList');
      
      if (sourceMolecules.length === 0) {
        list.innerHTML = '<li class="empty-state">No molecules found</li>';
        return;
      }
      
      list.innerHTML = sourceMolecules.map(m => {
        const exists = targetMoleculeKeys.has(m.molecule_key);
        const attachesTo = m.attaches_to === 'A' ? 'Activity' : m.attaches_to === 'M' ? 'Member' : 'Both';
        return `
          <li>
            <input type="checkbox" class="molecule-check" data-id="${m.molecule_id}" data-key="${m.molecule_key}"
                   ${exists ? '' : 'checked'} onchange="updateSelectionCount()">
            <div class="item-info">
              <div class="item-key">${m.molecule_key}</div>
              <div class="item-label">${m.label || ''}</div>
            </div>
            <span class="item-badge">${attachesTo}</span>
            ${exists ? '<span class="item-exists">exists in target</span>' : ''}
          </li>
        `;
      }).join('');
    }

    function selectAll(type) {
      document.querySelectorAll(`.${type}-check`).forEach(cb => cb.checked = true);
      updateSelectionCount();
    }

    function selectNone(type) {
      document.querySelectorAll(`.${type}-check`).forEach(cb => cb.checked = false);
      updateSelectionCount();
    }

    function selectNew(type) {
      const targetKeys = type === 'sysparm' ? targetSysparmKeys : targetMoleculeKeys;
      document.querySelectorAll(`.${type}-check`).forEach(cb => {
        cb.checked = !targetKeys.has(cb.dataset.key);
      });
      updateSelectionCount();
    }

    function updateSelectionCount() {
      const sysparmCount = document.querySelectorAll('.sysparm-check:checked').length;
      const moleculeCount = document.querySelectorAll('.molecule-check:checked').length;
      const total = sysparmCount + moleculeCount;
      
      document.getElementById('selectionCount').textContent = 
        `${sysparmCount} sysparms, ${moleculeCount} molecules selected`;
      document.getElementById('cloneBtn').disabled = total === 0;
    }

    async function cloneSelected() {
      const sourceId = document.getElementById('sourceTenant').value;
      const targetId = document.getElementById('targetTenant').value;
      
      const sysparmIds = Array.from(document.querySelectorAll('.sysparm-check:checked'))
        .map(cb => parseInt(cb.dataset.id));
      const moleculeIds = Array.from(document.querySelectorAll('.molecule-check:checked'))
        .map(cb => parseInt(cb.dataset.id));
      
      if (sysparmIds.length === 0 && moleculeIds.length === 0) {
        alert('No items selected');
        return;
      }
      
      const targetName = document.getElementById('targetTenant').selectedOptions[0].text;
      if (!confirm(`Clone ${sysparmIds.length} sysparms and ${moleculeIds.length} molecules to ${targetName}?`)) {
        return;
      }
      
      const statusEl = document.getElementById('statusMessage');
      statusEl.className = 'status-message';
      statusEl.textContent = 'Cloning...';
      statusEl.style.display = 'block';
      
      try {
        const response = await fetch(`${API_BASE}/v1/clone`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            source_tenant_id: parseInt(sourceId),
            target_tenant_id: parseInt(targetId),
            sysparm_ids: sysparmIds,
            molecule_ids: moleculeIds
          })
        });
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.error || 'Clone failed');
        }
        
        statusEl.className = 'status-message success';
        statusEl.textContent = `Success! Cloned ${result.sysparms_cloned} sysparms and ${result.molecules_cloned} molecules.`;
        
        // Reload to show updated state
        setTimeout(() => loadItems(), 1500);
        
      } catch (e) {
        statusEl.className = 'status-message error';
        statusEl.textContent = 'Error: ' + e.message;
      }
    }

    // Initialize
    loadTenants();
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
