<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Molecule Groups - Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: 100vh !important; min-height: auto !important; display: block; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 16px 20px; }

    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }

    .card { background: white; border: 1px solid #e5e7eb; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-title { font-weight: 600; font-size: 15px; color: #111827; }

    .groups-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .groups-table th { background: #f9fafb; padding: 8px 12px; text-align: left; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
    .groups-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
    .groups-table tr:hover { background: #f9fafb; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-active { background: #dcfce7; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .badge-count { background: #dbeafe; color: #1e40af; }

    .member-chips { display: flex; flex-wrap: wrap; gap: 4px; max-width: 400px; }
    .member-chip { display: inline-block; padding: 2px 8px; background: #f3f4f6; border-radius: 4px; font-size: 11px; font-family: monospace; }

    .empty-state { text-align: center; padding: 40px 20px; color: #6b7280; }

    /* Modal styles */
    .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1000; }
    .modal-backdrop.show { display: flex; align-items: center; justify-content: center; }
    .modal { background: white; border-radius: 8px; width: 90%; max-width: 500px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-header { padding: 16px; border-bottom: 1px solid #e5e7eb; font-weight: 600; font-size: 16px; }
    .modal-body { padding: 16px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 12px 16px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 8px; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-weight: 600; font-size: 12px; color: #374151; margin-bottom: 4px; }
    .form-input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1); }
    .form-hint { font-size: 11px; color: #6b7280; margin-top: 4px; }

    .members-editor { border: 1px solid #e5e7eb; border-radius: 4px; padding: 12px; }
    .members-editor-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 32px; }
    .member-chip-removable { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background: #e5e7eb; border-radius: 4px; font-size: 12px; font-family: monospace; }
    .member-chip-removable .remove-btn { cursor: pointer; color: #6b7280; font-weight: bold; }
    .member-chip-removable .remove-btn:hover { color: #dc2626; }
    .members-add-row { display: flex; gap: 8px; }
    .members-add-row input { flex: 1; }
    
    /* Typeahead styles */
    .typeahead-container { position: relative; flex: 1; }
    .typeahead-dropdown { 
      position: absolute; 
      top: 100%; 
      left: 0; 
      right: 0; 
      background: white; 
      border: 1px solid #d1d5db; 
      border-top: none;
      border-radius: 0 0 4px 4px; 
      max-height: 200px; 
      overflow-y: auto; 
      z-index: 100;
      display: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .typeahead-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .typeahead-item:hover { background: #f9fafb; }
    .typeahead-item:last-child { border-bottom: none; }
    .typeahead-item strong { font-family: monospace; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title">📦 Molecule Groups</h1>
            <p class="page-subtitle" id="moleculeInfo">Loading...</p>
          </div>
          <div style="display: flex; gap: 8px;">
            <a href="admin_molecules.html" class="btn btn-secondary">← Back to Molecules</a>
            <button class="btn btn-primary" onclick="openAddModal()">+ Add Group</button>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="card">
          <table class="groups-table">
            <thead>
              <tr>
                <th>Group Code</th>
                <th>Name</th>
                <th>Description</th>
                <th>Members</th>
                <th>Status</th>
                <th style="width: 100px;">Actions</th>
              </tr>
            </thead>
            <tbody id="groupsBody">
              <tr><td colspan="6" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-backdrop" id="groupModal">
    <div class="modal">
      <div class="modal-header" id="modalTitle">Add Group</div>
      <div class="modal-body">
        <input type="hidden" id="editLink">
        
        <div class="form-group">
          <label class="form-label">Group Code *</label>
          <input type="text" id="groupCode" class="form-input" placeholder="e.g., NYC, PREMIUM" maxlength="20" style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase()">
          <div class="form-hint">Uppercase, used in rules (e.g., origin IN GROUP 'NYC')</div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Group Name</label>
          <input type="text" id="groupName" class="form-input" placeholder="e.g., New York Area Airports">
        </div>
        
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" id="groupDesc" class="form-input" placeholder="Optional description">
        </div>
        
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="groupStatus" class="form-input">
            <option value="A">Active</option>
            <option value="I">Inactive</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">Members</label>
          <div class="members-editor">
            <div class="members-editor-chips" id="memberChips"></div>
            <div class="members-add-row">
              <div class="typeahead-container">
                <input type="text" id="newMemberInput" class="form-input" placeholder="Type to search..." autocomplete="off">
                <div class="typeahead-dropdown" id="memberTypeahead"></div>
              </div>
              <button class="btn btn-secondary" onclick="addSelectedMember()">Add</button>
            </div>
          </div>
          <div class="form-hint" id="memberHint">Type to search values for this molecule</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveGroup()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.LP_STATE?.apiBase || window.location.origin;
    const urlParams = new URLSearchParams(window.location.search);
    const moleculeId = urlParams.get('id');
    const tenantId = sessionStorage.getItem('tenant_id') || '1';
    
    let moleculeInfo = null;
    let currentMembers = [];
    let availableValues = []; // All possible values for this molecule
    let selectedMemberCode = null; // Currently selected member from typeahead
    let debounceTimer = null;
    
    async function loadMolecule() {
      if (!moleculeId) {
        document.getElementById('moleculeInfo').textContent = 'Error: No molecule ID provided';
        return;
      }
      
      try {
        const response = await fetch(`${API_BASE}/v1/molecules/${moleculeId}?tenant_id=${tenantId}`);
        if (!response.ok) throw new Error('Failed to load molecule');
        
        moleculeInfo = await response.json();
        document.getElementById('moleculeInfo').textContent = `${moleculeInfo.molecule_key} (${moleculeInfo.value_kind})`;
        document.title = `Groups: ${moleculeInfo.molecule_key} - Admin`;
        
        // Load available values for this molecule
        await loadAvailableValues();
        
        // Set up member input (dropdown or typeahead based on input_type)
        setupMemberInput();
        
        await loadGroups();
      } catch (e) {
        console.error('Error loading molecule:', e);
        document.getElementById('moleculeInfo').textContent = 'Error loading molecule';
      }
    }
    
    async function loadAvailableValues() {
      try {
        const vk = moleculeInfo.value_kind;
        
        if (vk === 'lookup' || vk === 'external_list') {
          // Lookup molecule: load from external table
          const response = await fetch(`${API_BASE}/v1/lookup-values/${moleculeInfo.molecule_key}?tenant_id=${tenantId}`);
          if (!response.ok) throw new Error('Failed to load lookup values');
          availableValues = await response.json();
        } else if (vk === 'list' || vk === 'internal_list') {
          // List molecule: load from molecule_value_text
          const response = await fetch(`${API_BASE}/v1/molecules/${moleculeId}/values?tenant_id=${tenantId}`);
          if (!response.ok) throw new Error('Failed to load list values');
          const listValues = await response.json();
          availableValues = listValues.map(v => ({
            code: v.value,
            name: v.label || v.value
          }));
        }
        
        // Update hint with molecule-specific info
        const hint = document.getElementById('memberHint');
        if (hint && availableValues.length > 0) {
          hint.textContent = `${availableValues.length} values available for ${moleculeInfo.label || moleculeInfo.molecule_key}`;
        }
      } catch (e) {
        console.error('Error loading available values:', e);
        availableValues = [];
      }
    }
    
    function setupMemberInput() {
      const container = document.querySelector('.members-add-row');
      const hint = document.getElementById('memberHint');
      
      // Same logic as template-form-renderer.js:
      // isDropdown = lookup/external_list/list/internal_list/embedded_list
      // isTypeahead = isDropdown AND input_type === 'T'
      const vk = moleculeInfo?.value_kind;
      const isDropdown = vk === 'lookup' || vk === 'external_list' || vk === 'list' || vk === 'internal_list' || vk === 'embedded_list';
      const isTypeahead = isDropdown && moleculeInfo?.input_type === 'T';
      
      if (isDropdown && !isTypeahead) {
        // DROPDOWN MODE for small lists
        container.innerHTML = `
          <select id="newMemberSelect" class="form-input" style="flex: 1;">
            <option value="">-- Select a value --</option>
          </select>
          <button class="btn btn-secondary" onclick="addSelectedMember()">Add</button>
        `;
        
        const select = document.getElementById('newMemberSelect');
        
        // Populate dropdown from availableValues
        availableValues.forEach(v => {
          if (!currentMembers.includes(v.code)) {
            const opt = document.createElement('option');
            opt.value = v.code;
            opt.textContent = `${v.code} - ${v.name || v.label || ''}`;
            select.appendChild(opt);
          }
        });
        
        hint.textContent = `${availableValues.length} values available for ${moleculeInfo.display_name || moleculeInfo.molecule_key}`;
      } else {
        // TYPEAHEAD MODE for large lists
        container.innerHTML = `
          <div class="typeahead-container">
            <input type="text" id="newMemberInput" class="form-input" placeholder="Type to search..." autocomplete="off">
            <div class="typeahead-dropdown" id="memberTypeahead"></div>
          </div>
          <button class="btn btn-secondary" onclick="addSelectedMember()">Add</button>
        `;
        
        setupTypeahead();
        hint.textContent = `Type to search values for ${moleculeInfo.display_name || moleculeInfo.molecule_key}`;
      }
    }
    
    function setupTypeahead() {
      const input = document.getElementById('newMemberInput');
      const dropdown = document.getElementById('memberTypeahead');
      
      if (!input || !dropdown) return;
      
      let debounceTimer;
      
      input.addEventListener('input', async (e) => {
        // Force uppercase
        const start = e.target.selectionStart;
        const end = e.target.selectionEnd;
        e.target.value = e.target.value.toUpperCase();
        e.target.setSelectionRange(start, end);
        
        // Clear selection when typing
        selectedMemberCode = null;
        
        const query = e.target.value.trim();
        
        clearTimeout(debounceTimer);
        
        if (query.length < 2) {
          dropdown.style.display = 'none';
          return;
        }
        
        debounceTimer = setTimeout(async () => {
          try {
            const moleculeKey = moleculeInfo?.molecule_key;
            const response = await fetch(`${API_BASE}/v1/lookup-search/${moleculeKey}?tenant_id=${tenantId}&q=${encodeURIComponent(query)}`);
            if (!response.ok) return;
            
            const results = await response.json();
            
            // Filter out already-added members
            const filtered = results.filter(a => !currentMembers.includes(a.code));
            
            if (filtered.length === 0) {
              dropdown.innerHTML = '<div class="typeahead-item" style="color: #6b7280;">No results found</div>';
              dropdown.style.display = 'block';
              return;
            }
            
            dropdown.innerHTML = filtered.map(a => `
              <div class="typeahead-item" data-code="${a.code}">
                <strong>${a.code}</strong> - ${a.name || ''}${a.city ? `, ${a.city}` : ''}
              </div>
            `).join('');
            
            dropdown.style.display = 'block';
            
            // Add click handlers
            dropdown.querySelectorAll('.typeahead-item').forEach(item => {
              item.addEventListener('click', () => {
                const code = item.dataset.code;
                input.value = code;
                selectedMemberCode = code;
                dropdown.style.display = 'none';
              });
              
              item.addEventListener('mouseenter', () => {
                item.style.background = '#f9fafb';
              });
              item.addEventListener('mouseleave', () => {
                item.style.background = 'white';
              });
            });
            
          } catch (err) {
            console.error('Typeahead search error:', err);
          }
        }, 200);
      });
      
      // Close dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (!input.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.style.display = 'none';
        }
      });
      
      // Handle keyboard navigation
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addSelectedMember();
        } else if (e.key === 'Escape') {
          dropdown.style.display = 'none';
        }
      });
    }
    
    
    async function loadGroups() {
      try {
        const response = await fetch(`${API_BASE}/v1/molecules/${moleculeId}/groups?tenant_id=${tenantId}`);
        if (!response.ok) throw new Error('Failed to load groups');
        
        const groups = await response.json();
        renderGroups(groups);
      } catch (e) {
        console.error('Error loading groups:', e);
        document.getElementById('groupsBody').innerHTML = '<tr><td colspan="6" class="empty-state">Error loading groups</td></tr>';
      }
    }
    
    function renderGroups(groups) {
      const tbody = document.getElementById('groupsBody');
      
      if (groups.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No groups defined for this molecule. Click "Add Group" to create one.</td></tr>';
        return;
      }
      
      tbody.innerHTML = groups.map(g => `
        <tr>
          <td><strong>${g.group_code}</strong></td>
          <td>${g.group_name || '-'}</td>
          <td>${g.description || '-'}</td>
          <td><span class="badge badge-count">${g.member_count} members</span></td>
          <td><span class="badge ${g.status === 'A' ? 'badge-active' : 'badge-inactive'}">${g.status === 'A' ? 'Active' : 'Inactive'}</span></td>
          <td>
            <button class="btn btn-secondary btn-sm" onclick="editGroup('${g.group_code}')">Edit</button>
            <button class="btn btn-secondary btn-sm" onclick="deleteGroup('${g.group_code}')" style="color: #dc2626;">Delete</button>
          </td>
        </tr>
      `).join('');
    }
    
    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'Add Group';
      document.getElementById('editLink').value = '';
      document.getElementById('groupCode').value = '';
      document.getElementById('groupName').value = '';
      document.getElementById('groupDesc').value = '';
      document.getElementById('groupStatus').value = 'A';
      selectedMemberCode = null;
      currentMembers = [];
      renderMemberChips();
      setupMemberInput(); // Rebuild input based on input_type
      document.getElementById('groupModal').classList.add('show');
      document.getElementById('groupCode').focus();
    }
    
    async function editGroup(groupCode) {
      try {
        const response = await fetch(`${API_BASE}/v1/molecules/${moleculeId}/groups/${encodeURIComponent(groupCode)}`);
        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: response.statusText }));
          throw new Error(err.error || 'Failed to load group');
        }
        
        const group = await response.json();
        
        document.getElementById('modalTitle').textContent = 'Edit Group';
        document.getElementById('editLink').value = groupCode;
        document.getElementById('groupCode').value = group.group_code;
        document.getElementById('groupName').value = group.group_name || '';
        document.getElementById('groupDesc').value = group.description || '';
        document.getElementById('groupStatus').value = group.status;
        selectedMemberCode = null;
        currentMembers = group.members || [];
        renderMemberChips();
        setupMemberInput(); // Rebuild input based on input_type
        document.getElementById('groupModal').classList.add('show');
      } catch (e) {
        console.error('Error loading group:', e);
        alert('Failed to load group: ' + e.message);
      }
    }
    
    function closeModal() {
      document.getElementById('groupModal').classList.remove('show');
    }
    
    function renderMemberChips() {
      const container = document.getElementById('memberChips');
      if (currentMembers.length === 0) {
        container.innerHTML = '<span style="color: #9ca3af; font-size: 12px;">No members added</span>';
        return;
      }
      
      container.innerHTML = currentMembers.map(m => {
        return `
          <span class="member-chip-removable">
            ${m}
            <span class="remove-btn" onclick="removeMember('${m}')">×</span>
          </span>
        `;
      }).join('');
    }
    
    function addSelectedMember() {
      // Same logic as template-form-renderer.js
      const vk = moleculeInfo?.value_kind;
      const isDropdown = vk === 'lookup' || vk === 'external_list' || vk === 'list' || vk === 'internal_list' || vk === 'embedded_list';
      const isTypeahead = isDropdown && moleculeInfo?.input_type === 'T';
      
      let code = null;
      
      if (isDropdown && !isTypeahead) {
        // DROPDOWN MODE
        const select = document.getElementById('newMemberSelect');
        code = select.value;
        
        if (!code) {
          select.style.borderColor = '#dc2626';
          setTimeout(() => { select.style.borderColor = ''; }, 1500);
          return;
        }
        
        if (!currentMembers.includes(code)) {
          currentMembers.push(code);
          currentMembers.sort();
          renderMemberChips();
          
          // Remove from dropdown options
          const selectedOption = select.querySelector(`option[value="${code}"]`);
          if (selectedOption) selectedOption.remove();
        }
        
        select.value = '';
      } else {
        // TYPEAHEAD MODE
        const input = document.getElementById('newMemberInput');
        const dropdown = document.getElementById('memberTypeahead');
        
        // If a value was selected from typeahead, use that
        code = selectedMemberCode;
        
        // If no selection, extract code using molecule's display_width
        if (!code) {
          const inputVal = input.value.trim().toUpperCase();
          const codeLength = moleculeInfo?.display_width || 3;
          code = inputVal.substring(0, codeLength);
        }
        
        if (!code || code.length < (moleculeInfo?.display_width || 1)) {
          input.style.borderColor = '#dc2626';
          setTimeout(() => { input.style.borderColor = ''; }, 1500);
          return;
        }
        
        if (!currentMembers.includes(code)) {
          currentMembers.push(code);
          currentMembers.sort();
          renderMemberChips();
        }
        
        // Clear input
        input.value = '';
        selectedMemberCode = null;
        dropdown.style.display = 'none';
        input.focus();
      }
    }
    
    function removeMember(value) {
      currentMembers = currentMembers.filter(m => m !== value);
      renderMemberChips();
    }
    
    async function saveGroup() {
      const editingGroupCode = document.getElementById('editLink').value;
      const data = {
        tenant_id: tenantId,
        group_code: document.getElementById('groupCode').value.trim().toUpperCase(),
        group_name: document.getElementById('groupName').value.trim() || null,
        description: document.getElementById('groupDesc').value.trim() || null,
        status: document.getElementById('groupStatus').value,
        members: currentMembers
      };
      
      if (!data.group_code) {
        alert('Group code is required');
        return;
      }
      
      try {
        const url = editingGroupCode 
          ? `${API_BASE}/v1/molecules/${moleculeId}/groups/${encodeURIComponent(editingGroupCode)}`
          : `${API_BASE}/v1/molecules/${moleculeId}/groups`;
        const method = editingGroupCode ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Failed to save group');
        }
        
        closeModal();
        await loadGroups();
      } catch (e) {
        console.error('Error saving group:', e);
        alert('Failed to save: ' + e.message);
      }
    }
    
    async function deleteGroup(groupCode) {
      if (!confirm('Delete this group? This cannot be undone.')) return;
      
      try {
        const response = await fetch(`${API_BASE}/v1/molecules/${moleculeId}/groups/${encodeURIComponent(groupCode)}`, {
          method: 'DELETE'
        });
        
        if (!response.ok) throw new Error('Failed to delete group');
        
        await loadGroups();
      } catch (e) {
        console.error('Error deleting group:', e);
        alert('Failed to delete: ' + e.message);
      }
    }
    
    // Initialize
    loadMolecule();
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
