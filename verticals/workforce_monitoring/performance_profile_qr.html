<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Performance Profile — Scan to Begin</title>
  <!--
    QR companion page for the Performance Profile (DEMO build, Session 122).

    URL is NOT hardcoded. The target is derived from where THIS page is served:
      base   = ?base=<override>  ||  window.location.origin
      target = base + '/verticals/workforce_monitoring/performance_profile.html'
    So opening this page on dev / erica-Heroku / prod each produces a QR that
    points at THAT environment automatically — the host is never written into a
    file or the database. (Per the Session 122 discussion: a per-ENVIRONMENT
    value belongs to the environment, not sysparm; sysparm is for per-TENANT
    config seeded identically across environments.) If prod ever uses a vanity
    domain different from where the app is served, set a per-app Heroku config
    var and surface it via a public config endpoint — or just append
    ?base=https://that-domain here.

    QR rendering is offline/self-contained via the vendored qrcode-generator
    (qrcode.min.js, MIT) — no external service call at scan time.
  -->
  <!-- shared QR lib at project root (absolute path works at any served depth) -->
  <script src="/qrcode.min.js"></script>
  <style>
    :root{ --pp-primary:#0f766e; --pp-ink:#0f172a; --pp-muted:#64748b; --pp-line:#e2e8f0; --pp-bg:#f1f5f9; }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--pp-bg);color:var(--pp-ink);
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#fff;border:1px solid var(--pp-line);border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08);
          padding:36px 40px;max-width:520px;width:100%;text-align:center}
    .brand{display:inline-flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:var(--pp-primary);margin-bottom:6px}
    .brand .mark{width:30px;height:30px;border-radius:8px;background:var(--pp-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px}
    h1{font-size:26px;margin:14px 0 6px}
    .sub{color:var(--pp-muted);font-size:15px;margin:0 0 22px}
    #qr{display:flex;justify-content:center;margin:8px auto 18px;width:280px;height:280px}
    #qr svg{width:280px;height:280px}
    .scan{font-size:15px;font-weight:600;color:#334155;margin:6px 0 14px}
    .url{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--pp-muted);
         word-break:break-all;background:var(--pp-bg);border:1px solid var(--pp-line);border-radius:10px;padding:10px 12px}
    .open{display:inline-block;margin-top:16px;color:var(--pp-primary);font-weight:600;text-decoration:none;font-size:14px}
    .foot{margin-top:22px;font-size:11px;color:#94a3b8}
    .err{color:#b91c1c;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="mark">i</span> Insight Health Solutions</div>
    <h1>Performance Profile</h1>
    <p class="sub">A confidential check-in for your health, well-being &amp; professional performance.</p>
    <div id="qr"></div>
    <div class="scan">📱 Scan with your phone&rsquo;s camera to begin</div>
    <div class="url" id="urlText">…</div>
    <a class="open" id="openLink" href="#">Or open the assessment in this browser →</a>
    <div class="foot">Insight Health Solutions · PI² Platform</div>
  </div>

<script>
(function(){
  "use strict";
  var PAGE_PATH = "/performance-profile";   // clean public route (Session 122)
  // Environment self-describes: override via ?base=, else the origin we're served from.
  var override = new URLSearchParams(location.search).get("base");
  var base = (override || window.location.origin).replace(/\/+$/, "");
  var target = base + PAGE_PATH;

  document.getElementById("urlText").textContent = target;
  document.getElementById("openLink").href = target;

  try {
    if (typeof qrcode !== "function") throw new Error("QR generator not loaded");
    var qr = qrcode(0, "M");        // 0 = auto-size, 'M' = standard error correction
    qr.addData(target);
    qr.make();
    document.getElementById("qr").innerHTML = qr.createSvgTag({ cellSize: 6, margin: 2, scalable: true });
  } catch (e) {
    document.getElementById("qr").innerHTML =
      '<div class="err">Could not render the QR code (' + (e && e.message ? e.message : 'error') +
      '). Use the link below.</div>';
  }
})();
</script>
</body>
</html>
