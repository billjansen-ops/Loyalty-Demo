<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Evaluators - Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="../../buttons.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: 100vh !important; min-height: auto !important; display: block; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 12px 20px; }
    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }
    .tenant-indicator { padding: 6px 10px; border-radius: 4px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .tenant-indicator.info { background: var(--primary-light, #dbeafe); color: var(--primary-dark, #1e40af); border: 1px solid var(--primary, #3b82f6); }
    .tenant-indicator.warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .table-container { background: white; border: 1px solid #e5e7eb; border-radius: 4px; overflow: hidden; }
    .table-header { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    .table-header h2 { margin: 0; font-size: 15px; font-weight: 600; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #f9fafb; padding: 6px 10px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
    .data-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; font-size: 13px; vertical-align: top; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover { background: #f9fafb; }
    .badge { display: inline-block; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-active { background: #dcfce7; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .code-cell { font-family: 'Monaco', 'Courier New', monospace; font-weight: 600; font-size: 12px; }
    .empty-state { text-align: center; padding: 24px 12px; color: #6b7280; }
    .row-actions { display: flex; gap: 6px; }
    .muted { font-size: 12px; color: #6b7280; }
    /* Edit panel (add/edit form — too many fields for inline row editing) */
    .edit-panel { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 4px; padding: 12px; margin-bottom: 12px; display: none; }
    .edit-panel.open { display: block; }
    .edit-panel h3 { margin: 0 0 10px; font-size: 14px; }
    .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .form-field { display: flex; flex-direction: column; gap: 3px; }
    .form-field label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.3px; }
    .form-field input, .form-field select { padding: 6px 8px; font-size: 13px; border: 1px solid #e2e8f0; border-radius: 4px; font-family: inherit; }
    .form-field.span2 { grid-column: span 2; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
  </style>
</head>
<body>
  <script src="../../brand-loader.js"></script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title">🧭 Evaluators</h1>
            <p class="page-subtitle">The vetted evaluator directory shown to participants — costs are disclosed up front</p>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <div id="tenantIndicator"></div>
            <a href="admin_settings.html" class="btn btn-secondary">← Settings</a>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="edit-panel" id="editPanel">
          <h3 id="editTitle">Add Evaluator</h3>
          <div class="form-grid">
            <div class="form-field">
              <label for="fCode">Code *</label>
              <input id="fCode" placeholder="TCAG" maxlength="20">
            </div>
            <div class="form-field span2">
              <label for="fName">Name *</label>
              <input id="fName" placeholder="Twin Cities Assessment Group" maxlength="100">
            </div>
            <div class="form-field">
              <label for="fCredentials">Credentials</label>
              <input id="fCredentials" placeholder="PhD, LP" maxlength="100">
            </div>
            <div class="form-field span2">
              <label for="fOrganization">Organization</label>
              <input id="fOrganization" maxlength="100">
            </div>
            <div class="form-field span2">
              <label for="fTypes">Evaluation Types</label>
              <input id="fTypes" placeholder="Comprehensive psychological + substance use evaluation" maxlength="200">
            </div>
            <div class="form-field">
              <label for="fCity">City</label>
              <input id="fCity" maxlength="50">
            </div>
            <div class="form-field">
              <label for="fState">State</label>
              <input id="fState" placeholder="MN" maxlength="2" style="text-transform:uppercase">
            </div>
            <div class="form-field">
              <label for="fCostLow">Cost From ($)</label>
              <input id="fCostLow" type="number" min="0" step="100" placeholder="3800">
            </div>
            <div class="form-field">
              <label for="fCostHigh">Cost To ($)</label>
              <input id="fCostHigh" type="number" min="0" step="100" placeholder="5200">
            </div>
            <div class="form-field span2">
              <label for="fCostNotes">Cost Notes</label>
              <input id="fCostNotes" placeholder="Travel not included" maxlength="200">
            </div>
            <div class="form-field">
              <label for="fPhone">Phone</label>
              <input id="fPhone" maxlength="25">
            </div>
            <div class="form-field">
              <label for="fEmail">Email</label>
              <input id="fEmail" maxlength="100">
            </div>
            <div class="form-field span2">
              <label for="fWebsite">Website</label>
              <input id="fWebsite" placeholder="https://…" maxlength="200">
            </div>
            <div class="form-field" id="activeField" style="display:none">
              <label for="fActive">Status</label>
              <select id="fActive"><option value="true">Active</option><option value="false">Inactive</option></select>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-secondary" onclick="closePanel()">Cancel</button>
            <button class="btn btn-primary" onclick="saveEvaluator()">💾 Save</button>
          </div>
        </div>

        <div class="table-container">
          <div class="table-header">
            <h2>Vetted Evaluators</h2>
            <button id="addBtn" class="btn btn-primary" onclick="addNew()">+ Add Evaluator</button>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>Code</th>
                <th>Evaluator</th>
                <th>Evaluation Types</th>
                <th>Location</th>
                <th>Cost</th>
                <th>Status</th>
                <th style="width: 140px;">Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="7" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.LP_STATE?.apiBase || window.location.origin;
    const TENANT_ID = sessionStorage.getItem('tenant_id');
    let editingId = null;
    let evaluators = [];

    function showTenantIndicator() {
      const tenantName = sessionStorage.getItem('tenant_name');
      const indicator = document.getElementById('tenantIndicator');
      if (!TENANT_ID) {
        indicator.innerHTML = `<span class="tenant-indicator warning">⚠️ <a href="../../menu.html">Select tenant</a></span>`;
      } else {
        indicator.innerHTML = `<span class="tenant-indicator info">${tenantName || 'Tenant ' + TENANT_ID}</span>`;
      }
    }

    function fmtCost(e) {
      if (e.cost_low == null && e.cost_high == null) return '<span class="muted">—</span>';
      const lo = e.cost_low != null ? '$' + Number(e.cost_low).toLocaleString() : '';
      const hi = e.cost_high != null ? '$' + Number(e.cost_high).toLocaleString() : '';
      const range = lo && hi ? `${lo}–${hi}` : (lo || hi);
      const note = e.cost_notes ? `<div class="muted">${esc(e.cost_notes)}</div>` : '';
      return `<strong>${range}</strong>${note}`;
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadData() {
      showTenantIndicator();
      if (!TENANT_ID) {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="empty-state">Please select a tenant.</td></tr>';
        return;
      }
      try {
        const resp = await fetch(`${API_BASE}/v1/evaluators?tenant_id=${TENANT_ID}`, { credentials: 'include' });
        if (!resp.ok) throw new Error(`Failed to load (${resp.status})`);
        evaluators = await resp.json();
        const tbody = document.getElementById('tableBody');
        if (!evaluators.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No evaluators defined. Click "+ Add Evaluator" to create one.</td></tr>';
          return;
        }
        tbody.innerHTML = evaluators.map(e => `
          <tr>
            <td class="code-cell">${esc(e.evaluator_code)}</td>
            <td>
              <div style="font-weight:600">${esc(e.evaluator_name)}</div>
              <div class="muted">${esc(e.credentials || '')}${e.credentials && e.organization ? ' · ' : ''}${esc(e.organization || '')}</div>
            </td>
            <td style="font-size:12px">${esc(e.evaluation_types || '—')}</td>
            <td>${esc(e.city || '')}${e.city && e.state ? ', ' : ''}${esc(e.state || '')}</td>
            <td>${fmtCost(e)}</td>
            <td>${e.is_active ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>'}</td>
            <td>
              <div class="row-actions">
                <button class="btn btn-secondary btn-sm" onclick="editItem(${e.evaluator_id})">✏️ Edit</button>
                <button class="btn btn-secondary btn-sm" onclick="deleteItem(${e.evaluator_id})">🗑️</button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch(err) {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="empty-state" style="color:#dc2626">Error: ${esc(err.message)}</td></tr>`;
      }
    }

    function openPanel(title, showActive) {
      document.getElementById('editTitle').textContent = title;
      document.getElementById('activeField').style.display = showActive ? '' : 'none';
      document.getElementById('editPanel').classList.add('open');
      document.getElementById('fCode').focus();
    }

    function closePanel() {
      editingId = null;
      document.getElementById('editPanel').classList.remove('open');
      ['fCode','fName','fCredentials','fOrganization','fTypes','fCity','fState','fCostLow','fCostHigh','fCostNotes','fPhone','fEmail','fWebsite'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('fActive').value = 'true';
    }

    function addNew() {
      closePanel();
      openPanel('Add Evaluator', false);
    }

    function editItem(id) {
      const e = evaluators.find(x => x.evaluator_id === id);
      if (!e) return;
      closePanel();
      editingId = id;
      document.getElementById('fCode').value = e.evaluator_code || '';
      document.getElementById('fName').value = e.evaluator_name || '';
      document.getElementById('fCredentials').value = e.credentials || '';
      document.getElementById('fOrganization').value = e.organization || '';
      document.getElementById('fTypes').value = e.evaluation_types || '';
      document.getElementById('fCity').value = e.city || '';
      document.getElementById('fState').value = (e.state || '').trim();
      document.getElementById('fCostLow').value = e.cost_low ?? '';
      document.getElementById('fCostHigh').value = e.cost_high ?? '';
      document.getElementById('fCostNotes').value = e.cost_notes || '';
      document.getElementById('fPhone').value = e.phone || '';
      document.getElementById('fEmail').value = e.email || '';
      document.getElementById('fWebsite').value = e.website || '';
      document.getElementById('fActive').value = String(!!e.is_active);
      openPanel(`Edit Evaluator — ${e.evaluator_name}`, true);
    }

    async function saveEvaluator() {
      const val = id => document.getElementById(id).value.trim();
      const num = id => { const v = val(id); return v === '' ? null : Number(v); };
      const body = {
        evaluator_code: val('fCode'),
        evaluator_name: val('fName'),
        credentials: val('fCredentials') || null,
        organization: val('fOrganization') || null,
        evaluation_types: val('fTypes') || null,
        city: val('fCity') || null,
        state: val('fState') ? val('fState').toUpperCase() : null,
        cost_low: num('fCostLow'),
        cost_high: num('fCostHigh'),
        cost_notes: val('fCostNotes') || null,
        phone: val('fPhone') || null,
        email: val('fEmail') || null,
        website: val('fWebsite') || null
      };
      if (!body.evaluator_code || !body.evaluator_name) { alert('Code and name are required'); return; }
      try {
        let resp;
        if (editingId) {
          body.is_active = document.getElementById('fActive').value === 'true';
          resp = await fetch(`${API_BASE}/v1/evaluators/${editingId}`, {
            method: 'PUT', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
        } else {
          body.tenant_id = TENANT_ID;
          resp = await fetch(`${API_BASE}/v1/evaluators`, {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
        }
        if (!resp.ok) throw new Error((await resp.json()).error || `Save failed (${resp.status})`);
        closePanel();
        loadData();
      } catch(e) { alert('Error: ' + e.message); }
    }

    async function deleteItem(id) {
      const e = evaluators.find(x => x.evaluator_id === id);
      if (!e) return;
      if (!confirm(`Delete evaluator "${e.evaluator_name}"?\n\nIf participants have already chosen this evaluator, mark it Inactive instead — inactive evaluators stay on past records but leave the participant-facing list.`)) return;
      try {
        const resp = await fetch(`${API_BASE}/v1/evaluators/${id}`, { method: 'DELETE', credentials: 'include' });
        if (!resp.ok) throw new Error((await resp.json()).error || `Delete failed (${resp.status})`);
        loadData();
      } catch(err) { alert('Error: ' + err.message); }
    }

    loadData();
  </script>
  <script src="../../lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
