<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Edit Survey - Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: 100vh !important; min-height: auto !important; display: block; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; padding: 0 20px; }
    .page-header { flex-shrink: 0; padding: 12px 0; border-bottom: 1px solid #e5e7eb; margin-bottom: 12px; }
    .page-title { font-size: 20px; font-weight: 600; margin: 0; }
    .page-subtitle { font-size: 13px; color: var(--text-muted); margin: 4px 0 0; }
    .page-content { flex: 1; overflow-y: auto; padding-bottom: 16px; }
    .form-section { background: white; border: 1px solid #e5e7eb; border-radius: 4px; padding: 12px; margin-bottom: 8px; }
    .form-row { display: grid; gap: 8px; margin-bottom: 8px; }
    .form-group { display: flex; flex-direction: column; }
    label { font-weight: 600; margin-bottom: 4px; font-size: 12px; }
    input, select, textarea { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; font-family: inherit; }
    input[readonly] { background: #f9fafb; color: #6b7280; }
    textarea { resize: vertical; min-height: 60px; }
    .tenant-indicator { padding: 6px 10px; border-radius: 4px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .tenant-indicator.info { background: var(--primary-light, #dbeafe); color: var(--primary-dark, #1e40af); border: 1px solid var(--primary, #3b82f6); }
    .tenant-indicator.warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title">📋 Create Survey</h1>
            <p class="page-subtitle">Configure a new survey definition</p>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <div id="tenantIndicator"></div>
            <a href="admin_surveys.html" class="btn btn-secondary">← Back to Surveys</a>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="form-section">
          <div class="form-row" style="grid-template-columns: 160px 1fr 140px 140px;">
            <div class="form-group">
              <label>Survey Code *</label>
              <input type="text" id="surveyCode" placeholder="e.g., PPSI" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
            </div>
            <div class="form-group">
              <label>Survey Name *</label>
              <input type="text" id="surveyName" placeholder="e.g., Physician Stress Survey">
            </div>
            <div class="form-group">
              <label>Respondent Type *</label>
              <select id="respondentType">
                <option value="S">Self-Report</option>
                <option value="C">Clinician</option>
                <option value="B">Both</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="status">
                <option value="A">Active</option>
                <option value="I">Inactive</option>
              </select>
            </div>
          </div>
          <div class="form-row" style="grid-template-columns: 1fr;">
            <div class="form-group">
              <label>Description</label>
              <textarea id="surveyDescription" placeholder="Brief description of this survey's purpose..."></textarea>
            </div>
          </div>

          <div style="display: flex; justify-content: flex-end; gap: 8px; padding-top: 12px; border-top: 1px solid #e5e7eb;">
            <a href="admin_surveys.html" class="btn btn-secondary">Cancel</a>
            <button class="btn btn-primary" onclick="saveSurvey()">Save Survey</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.LP_STATE?.apiBase || 'http://127.0.0.1:4001';
    const params = new URLSearchParams(window.location.search);
    const editLink = params.get('link');

    function showTenantIndicator() {
      const tenantId = sessionStorage.getItem('tenant_id');
      const tenantName = sessionStorage.getItem('tenant_name');
      const el = document.getElementById('tenantIndicator');
      if (!tenantId) {
        el.innerHTML = `<span class="tenant-indicator warning">⚠️ <a href="menu.html">Select tenant</a></span>`;
      } else {
        el.innerHTML = `<span class="tenant-indicator info">${tenantName}</span>`;
      }
    }

    async function loadSurvey() {
      showTenantIndicator();
      if (!editLink) return;
      document.querySelector('.page-title').textContent = '📋 Edit Survey';
      document.querySelector('.page-subtitle').textContent = 'Update survey configuration';
      document.getElementById('surveyCode').readOnly = true;

      const tenantId = sessionStorage.getItem('tenant_id');
      try {
        const res = await fetch(`${API_BASE}/v1/surveys/${editLink}?tenant_id=${tenantId}`);
        if (!res.ok) throw new Error();
        const s = await res.json();
        document.getElementById('surveyCode').value = s.survey_code;
        document.getElementById('surveyName').value = s.survey_name;
        document.getElementById('surveyDescription').value = s.survey_description || '';
        document.getElementById('respondentType').value = s.respondent_type;
        document.getElementById('status').value = s.status;
      } catch {
        alert('Failed to load survey.');
        window.location.href = 'admin_surveys.html';
      }
    }

    async function saveSurvey() {
      const tenantId = sessionStorage.getItem('tenant_id');
      if (!tenantId) { alert('Please select a tenant first.'); return; }

      const code = document.getElementById('surveyCode').value.trim();
      const name = document.getElementById('surveyName').value.trim();
      if (!code || !name) { alert('Survey Code and Name are required.'); return; }

      const body = {
        tenant_id: parseInt(tenantId),
        survey_code: code,
        survey_name: name,
        survey_description: document.getElementById('surveyDescription').value.trim() || null,
        respondent_type: document.getElementById('respondentType').value,
        status: document.getElementById('status').value
      };

      try {
        const url = editLink ? `${API_BASE}/v1/surveys/${editLink}` : `${API_BASE}/v1/surveys`;
        const method = editLink ? 'PUT' : 'POST';
        const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Save failed'); }
        window.location.href = 'admin_surveys.html';
      } catch (e) {
        alert('Failed to save survey: ' + e.message);
      }
    }

    loadSurvey();
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
