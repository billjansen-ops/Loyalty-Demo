<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Badge Management - Client Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    /* LONGORIA: Compact scroll layout */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .app-layout { height: 100vh !important; min-height: auto !important; display: block; }
    .main-content { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .page-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: white; }
    .page-content { flex: 1; overflow-y: auto; padding: 12px 20px; }

    .page-title { font-size: 20px; font-weight: 600; margin: 0; color: #111827; }
    .page-subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 0; }

    .tenant-indicator { padding: 6px 10px; border-radius: 4px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
    .tenant-indicator.info { background: var(--primary-light, #dbeafe); color: var(--primary-dark, #1e40af); border: 1px solid var(--primary, #3b82f6); }
    .tenant-indicator.warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }

    .table-container { background: white; border: 1px solid #e5e7eb; border-radius: 4px; overflow: hidden; }
    .table-header { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    .table-header h2 { margin: 0; font-size: 15px; font-weight: 600; }

    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #f9fafb; padding: 6px 10px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
    .data-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover { background: #f9fafb; }

    .badge { display: inline-block; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-active { background: #dcfce7; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }

    .code-cell { font-family: 'Monaco', 'Courier New', monospace; font-weight: 600; font-size: 12px; }
    .icon-cell { font-size: 18px; }
    .empty-state { text-align: center; padding: 24px 12px; color: #6b7280; }
    .row-actions { display: flex; gap: 6px; }
  </style>
</head>
<body>
  <script src="brand-loader.js"></script>
  <div class="app-layout">
    <main class="main-content">
      <div class="page-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h1 class="page-title">🏅 Badge Management</h1>
            <p class="page-subtitle">Manage member badges and achievements</p>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <div id="tenantIndicator"></div>
            <a href="admin_rules.html" class="btn btn-secondary">← Back to Program Rules</a>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div class="table-container">
          <div class="table-header">
            <h2>Badges</h2>
            <button class="btn btn-primary" onclick="addNewBadge()">+ Add Badge</button>
          </div>
          
          <table class="data-table">
            <thead>
              <tr>
                <th>Icon</th>
                <th>Code</th>
                <th>Name</th>
                <th>Status</th>
                <th style="width: 140px;">Actions</th>
              </tr>
            </thead>
            <tbody id="badgesBody">
              <tr><td colspan="5" class="empty-state">Loading badges...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.LP_STATE?.apiBase || 'http://127.0.0.1:4001';
    
    function showTenantIndicator() {
      const tenantId = sessionStorage.getItem('tenant_id');
      const tenantName = sessionStorage.getItem('tenant_name');
      const indicator = document.getElementById('tenantIndicator');
      
      if (!tenantId) {
        indicator.innerHTML = `<span class="tenant-indicator warning">⚠️ <a href="menu.html">Select tenant</a></span>`;
      } else {
        indicator.innerHTML = `<span class="tenant-indicator info">${tenantName || 'Tenant ' + tenantId}</span>`;
      }
    }
    
    async function loadBadges() {
      const tenantId = sessionStorage.getItem('tenant_id');
      
      showTenantIndicator();
      
      if (!tenantId) {
        document.getElementById('badgesBody').innerHTML = 
          '<tr><td colspan="5" class="empty-state">Please select a tenant to view badges.</td></tr>';
        return;
      }
      
      try {
        const response = await fetch(`${API_BASE}/v1/badges?tenant_id=${tenantId}`);
        if (!response.ok) throw new Error('Failed to load badges');
        
        const badges = await response.json();
        const tbody = document.getElementById('badgesBody');
        
        if (!badges || badges.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No badges found. Click "Add Badge" to create one.</td></tr>';
          return;
        }
        
        tbody.innerHTML = badges.map(badge => {
          const statusClass = badge.status === 'A' ? 'badge-active' : 'badge-inactive';
          const statusText = badge.status === 'A' ? 'Active' : 'Inactive';
          return `
            <tr>
              <td class="icon-cell">${badge.icon || '🏅'}</td>
              <td class="code-cell">${badge.badge_code || '-'}</td>
              <td>${badge.badge_name || '-'}</td>
              <td>
                <span class="badge ${statusClass}">${statusText}</span>
              </td>
              <td>
                <div class="row-actions">
                  <button class="btn btn-secondary btn-sm" onclick="editBadge(${badge.link})">✏️ Edit</button>
                  <button class="btn btn-secondary btn-sm" onclick="deleteBadge(${badge.link}, '${badge.badge_code}')">🗑️</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
        
      } catch (e) {
        console.error('Error loading badges:', e);
        document.getElementById('badgesBody').innerHTML = 
          '<tr><td colspan="5" class="empty-state" style="color: #dc2626;">Error loading badges. Please check the server connection.</td></tr>';
      }
    }
    
    function addNewBadge() {
      const tenantId = sessionStorage.getItem('tenant_id');
      if (!tenantId) {
        alert('Please select a tenant first');
        window.location.href = 'menu.html';
        return;
      }
      window.location.href = 'admin_badge_edit.html';
    }
    
    function editBadge(link) {
      window.location.href = `admin_badge_edit.html?link=${link}`;
    }
    
    async function deleteBadge(link, code) {
      if (!confirm(`Delete badge "${code}"? This cannot be undone.`)) return;
      
      try {
        const tenantId = sessionStorage.getItem('tenant_id') || '1';
        const response = await fetch(`${API_BASE}/v1/badges/${link}?tenant_id=${tenantId}`, {
          method: 'DELETE'
        });
        
        if (!response.ok) throw new Error('Delete failed');
        
        loadBadges();
      } catch (e) {
        alert('Failed to delete badge: ' + e.message);
      }
    }
    
    loadBadges();
  </script>
  <script src="lp-header.js"></script>
  <script>LPHeader.init({ area: 'client-admin' });</script>
</body>
</html>
